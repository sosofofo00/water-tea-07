function splitCSVLine(line){const r=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){r.push(cur.trim());cur='';}else{cur+=ch;}}r.push(cur.trim());return r;}

// 解析 Excel（支援 .xlsx 和 .xls，以及 Uber Eats 類別分析表）
function parseExcelData(buf){
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

    // 偵測 Uber Eats 類別/商品優惠分析表
    const firstCell=(raw[0]&&raw[0][0])||'';
    if(String(firstCell).includes('類別/商品優惠分析表')||String(firstCell).includes('商品優惠分析表')){
        const res=[];
        for(let i=0;i<raw.length;i++){
            const row=raw[i];
            if(!row||!row[0])continue;
            const name=String(row[0]).trim();
            // 跳過標題行、合計行、佔比行
            if(/商品名稱|合計|數量佔比|類別|招牌|鮮果|冰沙|^$/.test(name))continue;
            if(/^\d{4}\//.test(name))continue;
            // 數量在第6欄，且下一行是金額行（row[5]==='數量'）
            if(row[5]==='數量'||row[5]===null){
                const qty=parseInt(row[6],10);
                if(!qty||qty<=0)continue;
                const size=/\[XL\]/.test(name)?'XL':/\[L\]/.test(name)?'L':matchSize(name,'');
                const cleanName=name.replace(/\[.*?\]/g,'').trim();
                const product=matchProduct(cleanName)||matchProduct(name);
                res.push({product,size,qty,rawName:name,source:'Uber分析表'});
            }
        }
        if(res.length>0)return res;
    }

    // 一般 Excel → 轉 CSV 再解析
    return parseFileData(XLSX.utils.sheet_to_csv(ws));

// FCM 初始化
async function initFCM() {
    try {
        if (!('serviceWorker' in navigator) || !('Notification' in window)) return null;
        const reg = await navigator.serviceWorker.register('/water-tea-07/firebase-messaging-sw.js');
        fcmMessaging = firebase.messaging();
        return reg;
    } catch(e) {
        console.log('FCM init failed:', e);
        return null;
    }
}

// 請求推播權限並取得 FCM Token
async function requestPushPermission(uid) {
    try {
        if (!fcmMessaging) await initFCM();
        if (!fcmMessaging) return null;
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return null;
        const token = await fcmMessaging.getToken({ vapidKey: VAPID_KEY });
        if (token && uid) {
            await db.ref('fcmTokens/' + uid).set({ token, updatedAt: Date.now() });
            console.log('FCM Token 已儲存');
        }
        return token;
    } catch(e) {
        console.log('Push permission failed:', e);
        return null;
    }
}

function setupForegroundNotif() {
    if (!fcmMessaging) return;
    fcmMessaging.onMessage((payload) => {
        const { title, body } = payload.notification || {};
        if (title) {
            // 顯示瀏覽器通知
            if (Notification.permission === 'granted') {
                new Notification(title, { body: body || '', icon: '/icon.png', badge: '/icon.png' });
            }
        }
    });
}

// 取得今日應叫貨品項（叫的是明天的貨，所以取明天的星期）
function getTodayOrderItems(customItemsList){
    const tomorrow=new Date();
    tomorrow.setDate(tomorrow.getDate()+1);
    const day=tomorrow.getDay();
    const items=new Set();
    if([1,3,5].includes(day))DAILY_135.forEach(x=>items.add(x));
    if([2,4,6].includes(day))DAILY_246.forEach(x=>items.add(x));
    if([1,2,3,4,5].includes(day))DAILY_15.forEach(x=>items.add(x));
    if([0,3].includes(day))DAILY_37.forEach(x=>items.add(x));
    if(day===0)DAILY_0.forEach(x=>items.add(x));
    const weekItems=WEEKLY_ORDERS[day]||{};
    Object.values(weekItems).flat().forEach(x=>items.add(x));
    // 加入自訂品項有設定叫貨日的
    (customItemsList||[]).forEach(item=>{
        if((item.orderDays||[]).includes(day))items.add(item.id);
    });
    return {items, tomorrowDay: day};
}

            const uid=activeUser.id;
            const createOptions={
                publicKey:{
                    challenge,
                    rp:{name:'水之茶庫存盤點',id:window.location.hostname},
                    user:{
                        id:new TextEncoder().encode(uid),
                        name:uid,
                        displayName:activeUser.name||uid
                    },
                    pubKeyCredParams:[
                        {alg:-7,type:'public-key'},   // ES256 (iOS/Android)
                        {alg:-257,type:'public-key'},  // RS256 (Windows Hello)
                        {alg:-8,type:'public-key'},    // EdDSA
                    ],
                    authenticatorSelection:{
                        authenticatorAttachment:'platform', // 使用裝置內建（臉部/指紋）
                        userVerification:'preferred',       // preferred 比 required 相容性更好
                        residentKey:'preferred',
                    },
                    timeout:120000, // 延長至2分鐘
                    attestation:'none',
                }
            };
            const credential=await navigator.credentials.create(createOptions);
            if(credential){
                // 儲存 credential ID 到 localStorage
                const credId=btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
                localStorage.setItem('wt_face_user',uid);
                localStorage.setItem('wt_face_credId',credId);
                alert('✅ 生物辨識設定成功！\n下次可直接用臉部/指紋登入');
            }

            if(e.name==='NotAllowedError'){
                alert('⚠️ 已取消或被系統拒絕\n\n請確認：\n1. 手機已設定 Face ID / 指紋\n2. 使用 Safari（iOS）或 Chrome（Android）\n3. 不要在無痕模式下使用');

            window.crypto.getRandomValues(challenge);

                publicKey:{
                    challenge,
                    rpId:window.location.hostname,
                    userVerification:'preferred',
                    timeout:120000,
                }
            };
            const assertion=await navigator.credentials.get(getOptions);

    const writeLog=(ds,p)=>{const id=Date.now();const profile=allProfiles[activeUser?.id];const displayName=profile?.nickname||profile?.realname||activeUser?.name||activeUser?.id;db.ref('history/'+ds+'/'+id).set({...p,operator:activeUser?.id||'未知',operatorName:displayName});const old=new Date();old.setFullYear(old.getFullYear()-1);db.ref('history/'+old.toISOString().split('T')[0]).remove();};

    // ── 叫貨介面 ──

            const isOOS=outOfStock[item.id];const checked=(orderItems[item.id]||0)>0;

                    <span class="text-sm font-bold text-teal-300 min-w-[2rem] text-center">{orderItems[item.id]}</span>

        return(<div class="space-y-4">
            <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">

                <div class="mb-3"><label class="text-xs text-gray-500 font-bold block mb-1">從哪裡出貨</label>

                {!showAllItems&&todayItems.length>0&&(

                        <p class="text-xs font-bold text-amber-400 mb-2">📅 明天（星期{dayNames[tomorrowDay]}）固定叫貨品項</p>

                            <p class="text-[10px] font-bold text-teal-500 mb-2 bg-teal-950/30 px-2 py-1 rounded-lg">🛍️ 袋裝水果專區</p>

                        <div key={order.id} class="p-3 bg-gray-950 rounded-xl border border-gray-800">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-bold text-teal-400">{order.fromBranch}</span>
                                <span class={"text-[10px] px-2 py-0.5 rounded-full font-bold "+(order.status==='received'?"bg-teal-950/50 text-teal-400":order.status==='shipped'?"bg-blue-950/50 text-blue-400":order.status==='cancelled'?"bg-red-950/50 text-red-400":"bg-amber-950/50 text-amber-400")}>

                                <div class="flex gap-2 mt-2">
                                    <button onClick={()=>db.ref('orders/'+order.id+'/status').set('shipped').then(()=>showMsg('已標記出貨中'))} class="flex-1 py-1.5 bg-blue-700 text-white text-xs font-bold rounded-lg">🚚 標記出貨</button>
                                    <button onClick={()=>db.ref('orders/'+order.id+'/status').set('cancelled').then(()=>showMsg('已取消'))} class="flex-1 py-1.5 bg-red-900/50 text-red-400 text-xs font-bold rounded-lg">取消</button>
                                </div>
                            )}

    // ── 取貨介面 ──
    const renderPickupTab=()=>{
        const pendingOrders=Object.values(ordersData).filter(o=>o.status==='shipped'||o.status==='pending');
        if(pickupStep==='verify'&&pickupOrder){
            return(<div class="space-y-4"><div class="bg-gray-900 border border-teal-800/50 rounded-2xl p-4">

                <div class="bg-gray-950 rounded-xl p-3 mb-4 space-y-1">{Object.entries(pickupOrder.items||{}).map(([id,qty])=>{const item=ALL_ORDER_ITEMS.find(i=>i.id===id);return(<p key={id} class="text-sm text-gray-300">{item?.name||id} × {qty} {item?.unit||''}</p>);})}</div>
                {!pickupSender?(
                    <div class="space-y-3"><p class="text-xs font-bold text-blue-300 bg-blue-950/30 px-3 py-2 rounded-lg">① 出貨方登入確認</p>
                    <input value={pickupLoginId} onChange={e=>setPickupLoginId(e.target.value)} placeholder="帳號" class="w-full px-3 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none"/>
                    <input type="password" value={pickupLoginPw} onChange={e=>setPickupLoginPw(e.target.value)} placeholder="密碼" class="w-full px-3 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none"/>

                ):(
                    <div class="space-y-3"><p class="text-xs text-teal-400 font-bold bg-teal-950/30 px-3 py-2 rounded-lg">✅ 出貨方 {pickupSender.name} 已確認</p>
                    <p class="text-xs font-bold text-emerald-300 bg-emerald-950/30 px-3 py-2 rounded-lg">② 取貨方登入確認</p>
                    <input value={pickupLoginId} onChange={e=>setPickupLoginId(e.target.value)} placeholder="帳號" class="w-full px-3 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none"/>
                    <input type="password" value={pickupLoginPw} onChange={e=>setPickupLoginPw(e.target.value)} placeholder="密碼" class="w-full px-3 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none"/>
                    {pickupErr&&<p class="text-red-400 text-xs">{pickupErr}</p>}
                    <button onClick={()=>handlePickupVerify('receiver')} class="w-full py-3 bg-emerald-700 text-white font-bold rounded-2xl">✅ 取貨方確認收貨</button></div>
                )}
                <button onClick={()=>{setPickupStep('list');setPickupOrder(null);setPickupSender(null);setPickupLoginId('');setPickupLoginPw('');}} class="w-full py-2 bg-gray-800 text-gray-400 font-bold rounded-xl text-sm mt-2">取消</button>
            </div></div>);

        return(<div class="space-y-3">
            <div class="bg-blue-950/30 border border-blue-800/40 rounded-2xl p-3"><p class="text-xs text-blue-300">🔵 目前在線：<span class="font-bold text-white">{Object.keys(onlineUsers).length}</span> 人</p><p class="text-[10px] text-gray-500 mt-0.5">一般員工需兩人同時在線才能進行取貨確認</p></div>
            {pendingOrders.length===0?(<div class="text-center py-10 text-gray-600"><p class="text-3xl mb-2">📦</p><p>目前沒有待取貨的訂單</p></div>):
            pendingOrders.sort((a,b)=>b.id-a.id).map(order=>(<div key={order.id} class="bg-gray-900 border border-gray-800 rounded-2xl p-4">

                    <div><span class="text-sm font-bold text-teal-400">{order.fromBranch}</span><span class="text-gray-600 mx-1">→</span><span class="text-sm font-bold text-emerald-400">{order.toBranch||order.fromBranch}</span></div>
                    <span class={"text-[10px] px-2 py-0.5 rounded-full font-bold "+(order.status==='shipped'?"bg-blue-950/50 text-blue-400":"bg-amber-950/50 text-amber-400")}>{order.status==='shipped'?'🚚出貨中':'⏳待出貨'}</span>
                </div>
                <div class="space-y-0.5 mb-3">{Object.entries(order.items||{}).map(([id,qty])=>{const item=ALL_ORDER_ITEMS.find(i=>i.id===id);return(<p key={id} class="text-xs text-gray-400">{item?.name||id} × {qty}</p>);})}</div>
                <button onClick={()=>{if(!checkOnline())return;setPickupOrder(order);setPickupStep('verify');playAlert();}} class="w-full py-2.5 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-xl text-sm">📦 開始取貨確認（雙方需登入）</button>
            </div>))}
        </div>);
    };

    // ── 銷售倒扣 ──
    const renderSalesTab=()=>{
        if(!SALES_BRANCHES.includes(currentBranch))return(<div class="text-center py-16 text-gray-500"><p class="text-4xl mb-3">🏭</p><p>銷售倒扣僅限門市</p></div>);
        return(<div class="space-y-4">
            <div class="bg-blue-950/30 border border-blue-800/40 rounded-2xl p-3"><div class="space-y-1 text-xs text-gray-500"><p><span class="bg-orange-900/50 text-orange-300 px-1.5 py-0.5 rounded text-[10px] font-bold mr-2">熊貓</span>直接匯出 CSV</p><p><span class="bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded text-[10px] font-bold mr-2">Uber</span>直接匯出 CSV</p><p><span class="bg-teal-900/50 text-teal-300 px-1.5 py-0.5 rounded text-[10px] font-bold mr-2">POS</span>CSV 或 Excel (.xlsx)</p></div></div>
            {!filePreview&&!fileError&&(<label class="flex flex-col items-center justify-center w-full h-36 border-2 border-dashed border-gray-700 rounded-2xl cursor-pointer bg-gray-900 active:border-teal-600 transition-colors"><span class="text-3xl mb-2">📂</span><span class="text-sm font-bold text-gray-400">點擊上傳銷售報表</span><span class="text-xs text-gray-600 mt-1">支援 .csv 和 .xlsx</span><input type="file" accept=".csv,.xlsx,.xls" class="hidden" onChange={handleFile}/></label>)}
            {fileError&&(<div class="bg-red-950/50 border border-red-800 rounded-2xl p-4 text-center"><p class="text-red-400 text-sm font-semibold">{fileError}</p><button onClick={resetFile} class="mt-2 px-4 py-1.5 bg-gray-800 text-gray-300 text-xs font-bold rounded-xl">重新上傳</button></div>)}
            {filePreview&&deductSummary&&!deductDone&&(<div class="space-y-3">
                <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
                    <div class="flex justify-between items-center mb-3"><p class="text-sm font-bold text-gray-300">📄 {fileName}</p><button onClick={resetFile} class="text-[10px] text-gray-500 bg-gray-800 px-2 py-1 rounded-lg">重新上傳</button></div>
                    <div class="space-y-1 max-h-44 overflow-y-auto">{filePreview.map((row,i)=>(<div key={i} class={"flex items-center justify-between text-xs px-2 py-1.5 rounded-lg "+(row.product?"bg-gray-950":"bg-red-950/30 border border-red-900/50")}><span class={"font-medium "+(row.product?"text-gray-300":"text-red-400")}>{row.rawName}</span><div class="flex items-center gap-1.5">{row.source&&<span class="text-[9px] bg-gray-800 text-gray-500 px-1 rounded">{row.source}</span>}<span class={"text-[10px] px-1.5 py-0.5 rounded font-bold "+(row.size==='XL'?"bg-purple-900/50 text-purple-300":"bg-blue-900/50 text-blue-300")}>{row.size}</span><span class="text-emerald-400 font-bold">×{row.qty}</span>{!row.product&&<span class="text-red-400 text-[10px]">未識別</span>}</div></div>))}</div>
                    {deductSummary.unmatched.length>0&&<p class="text-xs text-amber-400 mt-2 bg-amber-950/30 px-2 py-1.5 rounded-lg border border-amber-900/50">⚠️ {deductSummary.unmatched.length} 筆未識別：{deductSummary.unmatched.slice(0,3).join('、')}{deductSummary.unmatched.length>3?'...':''}</p>}
                </div>
                <div class="bg-gray-900 border border-teal-900/50 rounded-2xl p-4">

    // ── 貨款 ──
    const renderPaymentTab=()=>{

        const exportPDF=()=>{
            if(payData.length===0){alert('沒有資料可以匯出');return;}
            const weekEnd=new Date(payWeek);weekEnd.setDate(weekEnd.getDate()+6);

            <style>
                body{font-family:'Noto Sans TC',sans-serif;padding:24px;max-width:500px;margin:0 auto;color:#1e293b;}

                .sub{color:#64748b;font-size:13px;margin-bottom:20px;}

                .info b{color:#0d9488;}
                table{width:100%;border-collapse:collapse;font-size:13px;}
                th{background:#0d9488;color:white;padding:8px 12px;text-align:left;}
                td{padding:8px 12px;border-bottom:1px solid #e2e8f0;}
                tr:last-child td{border-bottom:none;}
                .total-row{background:#f0fdfa;font-weight:bold;font-size:15px;}
                .total-row td{padding:12px;color:#0d9488;}
                .footer{text-align:center;color:#94a3b8;font-size:11px;margin-top:24px;}
            </style></head><body>
            <h1>🍵 水之茶 貨款明細</h1>
            <p class="sub">週結報表</p>

                </div>
                {customItems.length>0&&(<div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
                    <p class="text-xs font-bold text-gray-400 mb-3">已新增的自訂品項</p>
                    <div class="space-y-2">
                        {customItems.map(item=>(<div key={item.id} class="flex items-center justify-between p-2.5 bg-gray-950 rounded-xl">
                            <div>
                                <p class="text-sm font-semibold text-gray-300">{item.name}</p>
                                <p class="text-[10px] text-gray-600">{item.unit} ／ {item.category} ／ {(item.orderDays||[]).length>0?'叫貨日：'+(item.orderDays||[]).map(d=>['日','一','二','三','四','五','六'][d]).join('、'):'無固定時間'}</p>
                            </div>
                            <button onClick={()=>{if(window.confirm('確定刪除 '+item.name+' 嗎？'))db.ref('customItems/'+item.id).remove();}} class="px-2.5 py-1.5 bg-red-950/50 text-red-400 text-xs font-bold rounded-lg">刪除</button>
                        </div>))}
                    </div>
                </div>)}
            </div>)}
        </div>);
    };
    // ── 個人資料 ──
    const renderProfile=()=>(
        <div class="fixed inset-0 z-50 bg-black/60 flex items-center justify-center px-4" onClick={()=>setProfileOpen(false)}>
            <div class="w-full max-w-sm bg-gray-900 border border-gray-800 rounded-3xl shadow-2xl overflow-y-auto max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-gradient-to-r from-blue-900/50 to-teal-900/50">
                    <div>
                        <p class="font-black text-white text-base">👤 個人資料</p>
                        <p class="text-xs text-gray-400 mt-0.5">{activeUser?.id} ／ {ROLE_LABEL[activeUser?.role]}</p>
                    </div>
                    <button onClick={()=>setProfileOpen(false)} class="text-gray-500 text-xl font-bold w-8 h-8 flex items-center justify-center">✕</button>
                </div>
                <div class="p-4 space-y-3">
                    {profileMsg&&<div class="p-2.5 bg-teal-950/50 border border-teal-800 rounded-xl text-teal-300 text-sm text-center font-bold">{profileMsg}</div>}
                    {[
                        ['暱稱（顯示在歷史紀錄）','nickname','text','例如：小明'],
                        ['本名','realname','text','真實姓名'],
                        ['生日','birthday','date',''],
                        ['手機','phone','tel','0912-345-678'],
                        ['家用電話','homephone','tel','04-1234-5678'],
                        ['住址','address','text',''],
                        ['緊急聯絡人（姓名／關係／電話）','emergency','text','例如：王小明/父親/0912-000-000'],
                    ].map(([label,key,type,placeholder])=>(
                        <div key={key}>
                            <label class="text-xs text-gray-500 font-bold block mb-1">{label}</label>
                            <input type={type} value={profileData[key]||''} onChange={e=>setProfileData(p=>({...p,[key]:e.target.value}))} placeholder={placeholder}
                                class="w-full px-3 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none focus:border-blue-500"/>
                        </div>
                    ))}
                    <button onClick={()=>{
                        db.ref('profiles/'+activeUser.id).set({...profileData,uid:activeUser.id,updatedAt:new Date().toISOString()}).then(()=>{
                            setProfileMsg('✅ 資料已儲存！');setTimeout(()=>setProfileMsg(''),2000);
                        });
                    }} class="w-full py-3 bg-gradient-to-r from-blue-600 to-teal-600 text-white font-black rounded-2xl">儲存個人資料</button>

                    {/* 修改密碼區塊 */}
                    <div class="border-t border-gray-800 pt-3 mt-1">
                        <p class="text-xs font-bold text-amber-400 mb-3">🔑 修改密碼</p>
                        {[['目前密碼','currentPw'],['新密碼','newPw'],['確認新密碼','confirmPw']].map(([label,key])=>(
                            <div key={key} class="mb-2">
                                <label class="text-xs text-gray-500 font-bold block mb-1">{label}</label>
                                <input type="password" value={profileData[key]||''} onChange={e=>setProfileData(p=>({...p,[key]:e.target.value}))}
                                    class="w-full px-3 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none focus:border-amber-500"/>
                            </div>
                        ))}
                        <button onClick={()=>{
                            const cur=profileData.currentPw||'';
                            const nw=profileData.newPw||'';
                            const cf=profileData.confirmPw||'';
                            const u=users[activeUser.id];
                            if(!cur||!nw||!cf){setProfileMsg('❌ 請填寫所有密碼欄位');return;}
                            if(u.password!==cur){setProfileMsg('❌ 目前密碼錯誤');return;}
                            if(nw.length<4){setProfileMsg('❌ 新密碼至少4個字元');return;}
                            if(nw!==cf){setProfileMsg('❌ 新密碼和確認密碼不一致');return;}
                            db.ref('users/'+activeUser.id+'/password').set(nw).then(()=>{
                                setProfileMsg('✅ 密碼已修改成功！');
                                setProfileData(p=>({...p,currentPw:'',newPw:'',confirmPw:''}));
                                setTimeout(()=>setProfileMsg(''),2000);
                            });
                        }} class="w-full py-2.5 bg-amber-600 active:bg-amber-500 text-white font-bold rounded-xl text-sm">修改密碼</button>
                    </div>
                </div>
            </div>
        </div>
    );
    const renderNotifs=()=>{
        const isBossOrMgr=activeUser?.role==='boss'||activeUser?.role==='manager';
        return(<div class="fixed inset-0 z-50 flex justify-end" onClick={()=>setNotifOpen(false)}>
        <div class="w-80 max-w-full h-full bg-gray-900 border-l border-gray-800 shadow-2xl overflow-y-auto slide-in-r" onClick={e=>e.stopPropagation()}>
            <div class="p-4 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-gray-900 z-10">
                <p class="font-bold text-gray-300">🔔 通知</p>
                <button onClick={()=>setNotifOpen(false)} class="text-gray-500 text-xl font-bold w-8 h-8 flex items-center justify-center">✕</button>
            </div>
            {isBossOrMgr&&(<div class="p-3 border-b border-gray-800">
                <p class="text-xs font-bold text-amber-400 mb-2">📢 發送公告給全體員工</p>
                <input value={annTitle} onChange={e=>setAnnTitle(e.target.value)} placeholder="公告標題" class="w-full px-3 py-2 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none focus:border-amber-500 mb-2"/>
                <textarea value={annBody} onChange={e=>setAnnBody(e.target.value)} placeholder="公告內容..." rows={3} class="w-full px-3 py-2 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none focus:border-amber-500 resize-none mb-2"/>
                <button onClick={()=>{
                    if(!annTitle.trim()){alert('請填寫公告標題');return;}
                    const id=Date.now();
                    db.ref('notifications/'+id).set({
                        id,title:'📢 '+annTitle.trim(),body:annBody.trim(),
                        forAll:true,sender:activeUser.name,senderRole:activeUser.role,
                        time:Date.now(),read:false
                    }).then(()=>{
                        setAnnTitle('');setAnnBody('');
                        setBellAnim(true);setTimeout(()=>setBellAnim(false),600);
                        showMsg('✅ 公告已發送給全體員工！');
                    });
                }} class="w-full py-2 bg-amber-600 active:bg-amber-500 text-white font-bold rounded-xl text-sm">📤 發送公告</button>
            </div>)}
            <div class="p-3 space-y-2">
                {Object.values(notifsData).length===0?(<p class="text-center text-gray-600 text-sm py-8">沒有通知</p>):
                Object.values(notifsData).sort((a,b)=>b.time-a.time).slice(0,30).map(n=>(<div key={n.id} onClick={()=>db.ref('notifications/'+n.id+'/read').set(true)} class={"p-3 rounded-xl border cursor-pointer "+(n.read?"border-gray-800 opacity-60":"border-teal-800/50 bg-teal-950/10")}>
                    {n.sender&&<p class="text-[10px] text-amber-500 font-bold mb-0.5">📢 {n.sender} 發送</p>}
                    <p class="text-sm font-bold text-gray-300">{n.title}</p>
                    <p class="text-xs text-gray-500 mt-0.5">{n.body}</p>
                    <p class="text-[10px] text-gray-700 mt-1">{new Date(n.time).toLocaleString('zh-TW')}</p>
                </div>))}
            </div>
        </div>
    </div>);
    };

    // ── 漢堡選單 ──
    const renderMenu=()=>(<div class="fixed inset-0 z-50 flex" onClick={()=>setMenuOpen(false)}>
        <div class="w-64 h-full bg-gray-900 border-r border-gray-800 shadow-2xl slide-in overflow-y-auto" onClick={e=>e.stopPropagation()}>
            <div class="p-5 border-b border-gray-800 bg-gradient-to-r from-teal-700 to-emerald-700">
                <p class="font-black text-white text-lg">水之茶 庫存盤點</p>
                <p class="text-white/70 text-xs mt-1">{activeUser?.name} ({activeUser?.id})</p>
            </div>
            <div class="p-3 space-y-1">
                {[['📦 庫存管理','stock'],['📋 叫貨介面','order'],['🚚 取貨介面','pickup'],['💰 貨款介面','payment'],['📅 月結算','monthly'],['📜 歷史紀錄','history'],...(activeUser?.role==='boss'?[['⚙️ 管理後台','admin']]:[])].map(([label,tab])=>(
                    <button key={tab} onClick={()=>{setMainTab(tab);setMenuOpen(false);}} class={"w-full text-left px-4 py-3 rounded-xl font-bold text-sm transition-all "+(mainTab===tab?"bg-teal-600 text-white":"text-gray-400 hover:bg-gray-800")}>{label}</button>
                ))}
                <div class="pt-2 border-t border-gray-800 space-y-1">
                    <button onClick={()=>{setProfileOpen(true);setMenuOpen(false);db.ref('profiles/'+(activeUser?.id)).once('value').then(s=>{const d=s.val();if(d)setProfileData(d);});}} class="w-full text-left px-4 py-3 rounded-xl font-bold text-sm text-blue-400">👤 個人資料</button>
                    <button onClick={()=>{setupFace();setMenuOpen(false);}} class="w-full text-left px-4 py-3 rounded-xl font-bold text-sm text-purple-400">🔐 設定臉部辨識登入</button>
                    <button onClick={handleLogout} class="w-full text-left px-4 py-3 rounded-xl font-bold text-sm text-red-400">🚪 登出</button>
                </div>
            </div>
        </div>
    </div>);

    // ── 登入畫面 ──
    if(phase==='login')return(
        <div class="flex items-center justify-center min-h-screen bg-gray-950 px-4">
            <div class="w-full max-w-sm">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-teal-950/50 border-2 border-teal-800 rounded-3xl flex items-center justify-center mx-auto text-4xl mb-4">🍵</div>
                    <h1 class="text-2xl font-black text-gray-100">水之茶 庫存盤點</h1>
                    <p class="text-sm text-gray-500 mt-1">庫存管理系統</p>
                </div>
                <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 shadow-2xl">
                    <form onSubmit={handleLogin} class="space-y-4">
                        <div><label class="text-xs font-bold text-gray-500 uppercase block mb-1.5">帳號</label><input value={loginId} onChange={e=>setLoginId(e.target.value)} placeholder="請輸入帳號" class="w-full px-4 py-3 bg-gray-950 border border-gray-800 rounded-2xl text-sm text-gray-200 focus:outline-none focus:border-teal-500 font-mono" required/></div>
                        <div><label class="text-xs font-bold text-gray-500 uppercase block mb-1.5">密碼</label><input type="password" value={loginPw} onChange={e=>setLoginPw(e.target.value)} placeholder="請輸入密碼" class="w-full px-4 py-3 bg-gray-950 border border-gray-800 rounded-2xl text-sm text-gray-200 focus:outline-none focus:border-teal-500" required/></div>
                        {loginErr&&<p class="text-red-400 text-xs font-semibold text-center">{loginErr}</p>}
                        <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-teal-600 to-emerald-600 text-white font-black rounded-2xl text-base shadow-lg">登入系統</button>
                    </form>
                    <div class="mt-3 pt-3 border-t border-gray-800">
                        <button onClick={faceLogin} class="w-full py-3 bg-purple-700/80 text-white font-bold rounded-2xl text-sm flex items-center justify-center gap-2"><span class="text-lg">🔐</span>臉部/指紋辨識登入</button>
                    </div>
                </div>
            </div>
        </div>
    );
    if(phase==='loading')return(<div class="flex items-center justify-center min-h-screen bg-gray-950"><div class="text-center"><p class="text-4xl mb-3">🍵</p><p class="text-teal-400 font-bold animate-pulse">載入中...</p></div></div>);

    const availableBranches=ALL_BRANCHES.filter(b=>(activeUser?.branches||[]).includes(b));
    const isBoss=activeUser?.role==='boss';

    return(<div class="max-w-md mx-auto pb-24">
        {/* 頂部導覽列 */}
        <div class="bg-gradient-to-r from-teal-700 to-emerald-700 px-4 py-4 sticky top-0 z-40 shadow-lg">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onClick={()=>setMenuOpen(true)} class="flex flex-col gap-1 p-2 rounded-xl bg-black/20 active:bg-black/40">
                        <span class="w-5 h-0.5 bg-white rounded-full block"></span>
                        <span class="w-5 h-0.5 bg-white rounded-full block"></span>
                        <span class="w-5 h-0.5 bg-white rounded-full block"></span>
                    </button>
                    <div>
                        <p class="font-black text-white text-base leading-tight">水之茶 庫存盤點</p>
                        <div class="flex items-center gap-1.5"><span class={"text-[10px] font-bold "+ROLE_COLOR[activeUser?.role]}>{ROLE_LABEL[activeUser?.role]}</span><span class="text-white/60 text-[10px]">{activeUser?.name}</span></div>
                    </div>
                </div>
                <button onClick={()=>setNotifOpen(true)} class="relative p-2 rounded-xl bg-black/20 active:bg-black/40">
                    <span class={"text-xl "+(bellAnim?"bell-ring":"")}>🔔</span>
                    {unread>0&&<span class="absolute top-1 right-1 w-4 h-4 bg-red-500 rounded-full text-[9px] text-white font-black flex items-center justify-center">{unread>9?'9+':unread}</span>}
                </button>
            </div>
        </div>

        {/* 分店選擇 */}
        <div class="px-4 pt-3 pb-2">
            <p class="text-[10px] font-bold text-gray-600 uppercase mb-2">選擇據點</p>
            <div class="grid grid-cols-3 gap-1.5">
                {availableBranches.map(b=>(<button key={b} onClick={()=>{setCurrentBranch(b);setStockTab('stock');resetFile();}} class={"py-2 rounded-xl font-bold text-xs border transition-all "+(currentBranch===b?"bg-teal-600 text-white border-teal-500":"bg-gray-900 text-gray-500 border-gray-800")}>{LOGISTICS_BRANCHES.includes(b)?'📦':'🏪'} {b}</button>))}
            </div>
        </div>

        {/* 快顯訊息 */}
        {logMsg&&(<div class="mx-4 mb-3 p-3 bg-teal-950/80 text-teal-300 text-sm font-bold rounded-xl text-center border border-teal-800 backdrop-blur-md sticky top-16 z-30 shadow-lg">{logMsg}</div>)}

        {/* 內容區 */}
        <div class="px-4">
            {mainTab==='stock'&&(<>
                {SALES_BRANCHES.includes(currentBranch)&&(<div class="flex gap-2 mb-4">{[['stock','📦 庫存管理'],['sales','📊 銷售倒扣']].map(([t,l])=>(<button key={t} onClick={()=>setStockTab(t)} class={"flex-1 py-2.5 rounded-xl font-bold text-sm border "+(stockTab===t?(t==='sales'?"bg-teal-600 text-white border-teal-500":"bg-gray-700 text-white border-gray-600"):"bg-gray-900 text-gray-500 border-gray-800")}>{l}</button>))}</div>)}
                {stockTab==='sales'?renderSalesTab():(<>
                    <div class="mb-6"><div class="flex items-center gap-2 mb-3"><span class="w-1 h-5 bg-teal-500 rounded-full"></span><h2 class="text-base font-black text-gray-300">🧊 冷凍瓶支</h2></div><div class="space-y-3">{BOTTLE_ITEMS.map(renderItemCard)}</div></div>
                    <div class="mb-6"><div class="flex items-center gap-2 mb-3"><span class="w-1 h-5 bg-emerald-500 rounded-full"></span><h2 class="text-base font-black text-gray-300">🛍️ 冷凍袋數</h2></div><div class="space-y-3">{BAG_ITEMS.map(renderItemCard)}</div></div>
                    {renderHistory()}
                </>)}
            </>)}
            {mainTab==='order'&&renderOrderTab()}
            {mainTab==='pickup'&&renderPickupTab()}
            {mainTab==='payment'&&renderPaymentTab()}
            {mainTab==='monthly'&&renderMonthly()}
            {mainTab==='history'&&renderHistory()}
            {mainTab==='admin'&&renderAdmin()}
        </div>

        {menuOpen&&renderMenu()}
        {notifOpen&&renderNotifs()}
        {profileOpen&&renderProfile()}
    </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
