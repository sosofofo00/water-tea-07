// ── CSV/Excel 解析 ──
function matchProduct(raw) {
    const clean=raw.replace(/\s*\(.*?\)/g,'').replace(/\[.*?\]/g,'').replace(/\s+/g,'').trim();
    for (const k of Object.keys(DEDUCT_RULES)) { if (clean.includes(k)||k.includes(clean)) return k; }
    for (const k of Object.keys(DEDUCT_RULES)) { if (raw.includes(k)) return k; }
    return null;
}
function matchSize(raw,sc='') {
    const s=(raw+' '+(sc||'')).toUpperCase();
    if (/XL|特大/.test(s)) return 'XL';
    return 'L';
}
function splitCSVLine(line) {
    const r=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){r.push(cur.trim());cur='';}else{cur+=ch;}}
    r.push(cur.trim());return r;
}
function parseCSVRows(text) {
    const rows=[];let cur='',inQ=false,row=[];
    for(let i=0;i<text.length;i++){const ch=text[i];
        if(ch==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
        else if(ch===','&&!inQ){row.push(cur.trim());cur='';}
        else if(ch==='\n'&&!inQ){row.push(cur.trim());cur='';rows.push(row);row=[];}
        else if(ch!=='\r'){cur+=ch;}
    }
    if(cur||row.length){row.push(cur.trim());rows.push(row);}
    return rows;
}
function parseFileData(text) {
    const clean=text.replace(/^\uFEFF/,'');
    const lines=clean.split(/\r?\n/);
    const first=lines[0]||'';
    if(/餐點.*總額.*銷售/.test(first)){
        const res=[];
        for(let i=1;i<lines.length;i++){const c=splitCSVLine(lines[i]);if(!c[0])continue;const raw=c[0].trim(),qty=parseInt(c[1],10);if(!qty||qty<=0)continue;const size=/特大杯/.test(raw)?'XL':'L';const p=matchProduct(raw.replace(/\s*\(.*?\)/g,'').trim())||matchProduct(raw);res.push({product:p,size,qty,rawName:raw,source:'熊貓'});}
        return res.length>0?res:null;
    }
    if(/訂單.*ID|商品名稱.*銷售單位/.test(first)){
        const hdr=splitCSVLine(lines[0]);const cp=hdr.findIndex(h=>h==='商品名稱');const cq=hdr.findIndex((h,i)=>h==='最終數量'&&i>12);if(cp===-1)return null;
        const res=[];
        for(let i=1;i<lines.length;i++){const c=splitCSVLine(lines[i]);const raw=(c[cp]||'').trim();if(!raw)continue;const qty=parseInt(c[cq]||c[14],10);if(!qty||qty<=0)continue;res.push({product:matchProduct(raw),size:matchSize(raw,''),qty,rawName:raw,source:'Uber'});}
        return res.length>0?res:null;
    }
    if(/類別商品銷售排行榜|排行榜/.test(lines.slice(0,5).join(''))){
        const allRows=parseCSVRows(clean);let cn=4,cq=7;
        for(const row of allRows){if(row[4]&&/商品名稱/.test(row[4])){const a=row.findIndex(c=>/商品名稱/.test(c));const b=row.findIndex(c=>/^數量$/.test(c.trim()));if(a>=0)cn=a;if(b>=0)cq=b;break;}}
        const res=[];
        for(const row of allRows){const raw=(row[cn]||'').trim();if(!raw||/商品名稱|類別|排行|合計|主管|稽核/.test(raw))continue;if(/^\d{4}\//.test(raw)||raw==='~')continue;const qty=parseInt((row[cq]||'').replace(/,/g,''),10);if(!qty||qty<=0)continue;const size=/\[XL\]/.test(raw)?'XL':matchSize(raw,'');const p=matchProduct(raw.replace(/\[.*?\]/g,'').trim())||matchProduct(raw);res.push({product:p,size,qty,rawName:raw,source:'POS'});}
        return res.length>0?res:null;
    }
    const hdr=splitCSVLine(lines[0]);const cn2=hdr.findIndex(h=>/品項|品名|name|商品/.test(h));const cs2=hdr.findIndex(h=>/杯型|size|規格/.test(h));const cq2=hdr.findIndex(h=>/數量|qty|quantity|count/.test(h));
    if(cn2===-1||cq2===-1)return null;
    const res=[];
    for(let i=1;i<lines.length;i++){const c=splitCSVLine(lines[i]);if(!c[cn2])continue;const qty=parseInt(c[cq2],10);if(!qty||qty<=0)continue;res.push({product:matchProduct(c[cn2]),size:matchSize(c[cn2],cs2>=0?c[cs2]:''),qty,rawName:c[cn2],source:'自訂'});}
    return res.length>0?res:null;
}
function parseExcelData(buf) {
    const wb=XLSX.read(buf,{type:'array'});
    return parseFileData(XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]));
}

                upgraded[itemId]={};
                Object.entries(branches).forEach(([branch,val])=>{
                    // 若 ppb > 1 且 val <= 50（合理袋數上限），判定為舊袋數格式
                    if(ppb>1 && val<=50 && !raw['__v2_migrated']){
                        upgraded[itemId][branch]=val*ppb;
                        needWrite=true;
                    } else {
                        upgraded[itemId][branch]=val;
                    }
                });
            });
            if(needWrite){
                upgraded['__v2_migrated']={done:true};
                db.ref('stocks').set(upgraded);
                setStockData(upgraded);
            } else {
                setStockData(raw);
            }
            setPhase(p=>p==='loading'?p:p);
        });
        hRef.on('value',s=>setHistoryData(s.val()||{}));
        const saved=localStorage.getItem('wt_user');
        if(saved){
            db.ref('users/'+saved).once('value').then(s=>{
                const u=s.val();
                if(u&&u.active){setActiveUser({id:saved,...u});setCurrentBranch(u.branches[0]);setPhase('main');}
                else{setPhase('login');}
            });
        } else {setPhase('login');}
        return()=>{sRef.off();hRef.off();};
    },[]);

    const showMsg=(msg)=>{setLogMsg(msg);setTimeout(()=>setLogMsg(''),2000);};

    const handleLogin=(e)=>{
        e.preventDefault();
        const uid=loginId.trim(),pw=loginPw.trim();
        const u=users[uid];
        if(!u){setLoginErr('❌ 帳號不存在');return;}
        if(!u.active){setLoginErr('❌ 帳號已停用，請聯絡老闆');return;}
        if(u.password!==pw){setLoginErr('❌ 密碼錯誤');return;}
        localStorage.setItem('wt_user',uid);
        setActiveUser({id:uid,...u});setCurrentBranch(u.branches[0]);setLoginErr('');setPhase('main');
    };

    const handleLogout=()=>{
        if(!window.confirm('確定要登出嗎？'))return;
        localStorage.removeItem('wt_user');
        setActiveUser(null);setPhase('login');setLoginId('');setLoginPw('');
    };

    const writeLog=(dateStr,payload)=>{
        const id=Date.now();
        db.ref('history/'+dateStr+'/'+id).set({...payload,operator:activeUser?.id||'未知'});
        const old=new Date();old.setFullYear(old.getFullYear()-1);
        db.ref('history/'+old.toISOString().split('T')[0]).remove();
    };

    // 取得某品項在目前分店的包數
    const getPacks=(itemId)=>(stockData[itemId]&&stockData[itemId][currentBranch])||0;

    // +1袋 / -1袋
    const handleBagClick=(itemId,itemName,bagChange)=>{
        const ppb=PACKS_PER_BAG[itemId]||1;
        const packChange=bagChange*ppb;
        if(packChange>0&&!LOGISTICS_BRANCHES.includes(currentBranch)){
            if(!window.confirm('確定要增加門市庫存嗎？'))return;
        }
        const cur=getPacks(itemId);
        const nxt=Math.max(0,cur+packChange);
        db.ref('stocks/'+itemId+'/'+currentBranch).set(nxt).then(()=>{
            const now=new Date();
            const {bags,rem}=packsToDisplay(nxt,itemId);
            writeLog(now.toISOString().split('T')[0],{
                time:now.toTimeString().substring(0,5),branch:currentBranch,
                item:itemName,type:bagChange>0?'入庫(+'+Math.abs(bagChange)+'袋)':'消耗(-'+Math.abs(bagChange)+'袋)',
                amount:Math.abs(packChange),result:nxt,
                display:bags+'袋'+rem+'包'
            });
            showMsg('【'+itemName+'】'+bags+'袋'+rem+'包');
        });
    };

    // +1包 / -1包
    const handlePackClick=(itemId,itemName,packChange)=>{
        if(packChange>0&&!LOGISTICS_BRANCHES.includes(currentBranch)){
            if(!window.confirm('確定要增加門市庫存嗎？'))return;
        }
        const cur=getPacks(itemId);
        const nxt=Math.max(0,cur+packChange);
        db.ref('stocks/'+itemId+'/'+currentBranch).set(nxt).then(()=>{
            const now=new Date();
            const {bags,rem}=packsToDisplay(nxt,itemId);
            writeLog(now.toISOString().split('T')[0],{
                time:now.toTimeString().substring(0,5),branch:currentBranch,
                item:itemName,type:packChange>0?'入庫(+'+Math.abs(packChange)+'包)':'消耗(-'+Math.abs(packChange)+'包)',
                amount:Math.abs(packChange),result:nxt,
                display:bags+'袋'+rem+'包'
            });
            showMsg('【'+itemName+'】'+bags+'袋'+rem+'包');
        });
    };

    // 確認修改（袋數框+包數框合計）
    const handleCustomInput=(itemId,itemName)=>{
        const ppb=PACKS_PER_BAG[itemId]||1;
        const bags=parseInt(bagInput[itemId])||0;
        const packs=parseInt(packInput[itemId])||0;
        if(bags<0||packs<0){alert('請輸入 ≥ 0 的數字');return;}
        if(bags===0&&packs===0){alert('請輸入袋數或包數');return;}
        const newPacks=bags*ppb+packs;
        const cur=getPacks(itemId);
        if(newPacks>cur&&!LOGISTICS_BRANCHES.includes(currentBranch)){
            if(!window.confirm('確定要增加門市庫存嗎？'))return;
        }
        db.ref('stocks/'+itemId+'/'+currentBranch).set(newPacks).then(()=>{
            const now=new Date();
            const {bags:b,rem:r}=packsToDisplay(newPacks,itemId);
            writeLog(now.toISOString().split('T')[0],{
                time:now.toTimeString().substring(0,5),branch:currentBranch,
                item:itemName,type:'盤點('+bags+'袋'+packs+'包)',
                amount:Math.abs(newPacks-cur),result:newPacks,
                display:b+'袋'+r+'包'
            });
            showMsg('【'+itemName+'】已更新：'+b+'袋'+r+'包');
            setBagInput(p=>({...p,[itemId]:''}));
            setPackInput(p=>({...p,[itemId]:''}));
        });
    };

    const handleShipment=(itemId,itemName)=>{
        const ppb=PACKS_PER_BAG[itemId]||1;
        const bags=parseInt(bagInput[itemId])||0;
        const packs=parseInt(packInput[itemId])||0;
        if(bags===0&&packs===0){alert('請輸入出貨數量');return;}
        const shipPacks=bags*ppb+packs;
        const targets=ALL_BRANCHES.filter(b=>b!==currentBranch);
        const target=shipToBranches[itemId]||targets[0];
        const srcPacks=getPacks(itemId);
        const dstPacks=(stockData[itemId]&&stockData[itemId][target])||0;
        if(srcPacks<shipPacks&&!window.confirm(currentBranch+'庫存不足，確定強制出貨？'))return;
        const newSrc=Math.max(0,srcPacks-shipPacks);
        const newDst=dstPacks+shipPacks;
        const updates={};
        updates['stocks/'+itemId+'/'+currentBranch]=newSrc;
        updates['stocks/'+itemId+'/'+target]=newDst;
        db.ref().update(updates).then(()=>{
            const now=new Date();
            const {bags:b,rem:r}=packsToDisplay(newSrc,itemId);
            writeLog(now.toISOString().split('T')[0],{
                time:now.toTimeString().substring(0,5),branch:currentBranch,
                item:itemName,type:'🚚轉運至'+target+'('+bags+'袋'+packs+'包)',
                amount:shipPacks,result:newSrc,display:b+'袋'+r+'包'
            });
            showMsg('已配發至 '+target);
            setBagInput(p=>({...p,[itemId]:''}));
            setPackInput(p=>({...p,[itemId]:''}));
        });
    };

    // ── 檔案上傳 ──
    const handleFile=(e)=>{
        setFilePreview(null);setFileError('');setDeductSummary(null);setDeductDone(false);
        const file=e.target.files[0];if(!file)return;
        setFileName(file.name);
        const isExcel=/\.(xlsx|xls)$/i.test(file.name);
        if(isExcel){
            const reader=new FileReader();
            reader.onload=(ev)=>{try{processRows(parseExcelData(ev.target.result));}catch(err){setFileError('❌ Excel 解析失敗：'+err.message);}};
            reader.readAsArrayBuffer(file);
        } else {
            const reader=new FileReader();
            reader.onload=(ev)=>processRows(parseFileData(ev.target.result));
            reader.readAsText(file,'UTF-8');
        }
    };

    const processRows=(rows)=>{
        if(!rows){setFileError('❌ 無法識別格式！支援：熊貓、Uber、POS排行榜、Excel(.xlsx)、自訂CSV');return;}
        if(rows.length===0){setFileError('❌ 找不到有效銷售資料');return;}
        setFilePreview(rows);
        const rawPacks={},unmatched=[];
        rows.forEach(row=>{
            if(!row.product){unmatched.push(row.rawName);return;}
            const rule=DEDUCT_RULES[row.product];if(!rule){unmatched.push(row.rawName);return;}
            const sr=rule[row.size]||rule['L'];
            Object.entries(sr).forEach(([id,n])=>{rawPacks[id]=(rawPacks[id]||0)+n*row.qty;});
        });
        // 倒扣計算：Firebase 現在存包數，直接扣包數
        const summary={};
        Object.entries(rawPacks).forEach(([id,consumed])=>{
            const ppb=PACKS_PER_BAG[id]||1;
            const curPacks=getPacks(id);
            const remPacks=Math.max(0,curPacks-consumed);
            const curD=packsToDisplay(curPacks,id);
            const remD=packsToDisplay(remPacks,id);
            summary[id]={consumed,ppb,curPacks,remPacks,curD,remD};
        });
        setDeductSummary({summary,unmatched});
    };

    const handleConfirmDeduct=()=>{
        if(!window.confirm('確認從【'+currentBranch+'】扣除原料庫存？'))return;
        const {summary}=deductSummary;
        const updates={},logs=[];
        Object.entries(summary).forEach(([id,info])=>{
            if(info.consumed<=0)return;
            updates['stocks/'+id+'/'+currentBranch]=info.remPacks;
            logs.push({id,consumed:info.consumed,remPacks:info.remPacks,name:ING_NAMES[id]||id,remD:info.remD});
        });
        db.ref().update(updates).then(()=>{
            const now=new Date(),ds=now.toISOString().split('T')[0];
            logs.forEach(l=>writeLog(ds,{
                time:now.toTimeString().substring(0,5),branch:currentBranch,
                item:l.name,type:'📊CSV銷售倒扣',
                amount:l.consumed,result:l.remPacks,
                display:l.remD.bags+'袋'+l.remD.rem+'包'
            }));
            setDeductDone(true);
            showMsg('✅ '+currentBranch+' 銷售倒扣完成！');
        });
    };

    const resetFile=()=>{setFilePreview(null);setFileError('');setFileName('');setDeductSummary(null);setDeductDone(false);};

    // ── 每月結算 ──
    const calcMonthly=()=>{
        const prefix=monthFilter;
        const result={};
        Object.entries(historyData).forEach(([date,logs])=>{
            if(!date.startsWith(prefix))return;
            Object.values(logs).forEach(log=>{
                if(log.branch!==monthBranch)return;
                const key=log.item;
                if(!result[key])result[key]={item:key,inPacks:0,outPacks:0,deductPacks:0};
                if(log.type.includes('入庫')||log.type.includes('增')||log.type.includes('轉運至'+monthBranch))result[key].inPacks+=log.amount;
                else if(log.type==='📊CSV銷售倒扣')result[key].deductPacks+=log.amount;
                else result[key].outPacks+=log.amount;
            });
        });
        return Object.values(result).filter(r=>r.inPacks>0||r.outPacks>0||r.deductPacks>0);
    };

    // ── 管理後台 ──
    const handleSaveUser=()=>{
        if(!newUser.id||!newUser.password||!newUser.name){setAdminMsg('❌ 請填寫所有欄位');return;}
        if(users[newUser.id]&&!editUser){setAdminMsg('❌ 帳號已存在');return;}
        db.ref('users/'+newUser.id).set({password:newUser.password,role:newUser.role,name:newUser.name,branches:newUser.branches,active:newUser.active}).then(()=>{
            setUsers(p=>({...p,[newUser.id]:{...newUser}}));
            setAdminMsg('✅ 儲存成功！');
            setNewUser({id:'',password:'',name:'',role:'staff',branches:['自強店'],active:true});
            setAdminTab('users');setEditUser(null);
            setTimeout(()=>setAdminMsg(''),2000);
        });
    };
    const handleToggleUser=(uid)=>{
        const u=users[uid];if(!u)return;
        if(uid===activeUser?.id){alert('不能停用自己！');return;}
        db.ref('users/'+uid+'/active').set(!u.active).then(()=>setUsers(p=>({...p,[uid]:{...p[uid],active:!u.active}})));
    };
    const handleDeleteUser=(uid)=>{
        if(uid===activeUser?.id){alert('不能刪除自己！');return;}
        if(!window.confirm('確定刪除帳號 '+uid+' 嗎？'))return;
        db.ref('users/'+uid).remove().then(()=>setUsers(p=>{const n={...p};delete n[uid];return n;}));
    };
    const startEdit=(uid)=>{
        const u=users[uid];
        setNewUser({id:uid,password:u.password,name:u.name,role:u.role,branches:u.branches||[],active:u.active});
        setEditUser(uid);setAdminTab('add');
    };

    // ── 渲染品項卡片 ──
    const renderItemCard=(item)=>{
        const packs=getPacks(item.id);
        const ppb=PACKS_PER_BAG[item.id]||1;
        const {bags,rem}=packsToDisplay(packs,item.id);
        const isLow=packs<=LOW_STOCK_PACKS;
        const bVal=bagInput[item.id]||'';
        const pVal=packInput[item.id]||'';
        const totalInput=(parseInt(bVal)||0)*ppb+(parseInt(pVal)||0);
        const targets=ALL_BRANCHES.filter(b=>b!==currentBranch);
        const tgt=shipToBranches[item.id]||targets[0];
        const isBagUnit=ppb>1;

        // 雙框輸入區（共用）
        const renderDualInput=()=>(
            <div class="space-y-2">
                <div class="flex gap-2">
                    {isBagUnit&&(
                        <div class="flex-1">
                            <label class="text-[10px] text-gray-600 font-bold block mb-1">袋數</label>
                            <div class="flex items-center bg-gray-950 border border-gray-700 rounded-xl overflow-hidden focus-within:border-teal-500">
                                <input type="number" inputmode="numeric" placeholder="0" value={bVal}
                                    onChange={e=>setBagInput(p=>({...p,[item.id]:e.target.value}))}
                                    class="flex-1 px-3 py-2 bg-transparent text-sm text-gray-100 focus:outline-none w-0"/>
                                <span class="text-xs text-gray-500 pr-2 font-bold">袋</span>
                            </div>
                        </div>
                    )}
                    <div class="flex-1">
                        <label class="text-[10px] text-gray-600 font-bold block mb-1">包數</label>
                        <div class="flex items-center bg-gray-950 border border-gray-700 rounded-xl overflow-hidden focus-within:border-teal-500">
                            <input type="number" inputmode="numeric" placeholder="0" value={pVal}
                                onChange={e=>setPackInput(p=>({...p,[item.id]:e.target.value}))}
                                class="flex-1 px-3 py-2 bg-transparent text-sm text-gray-100 focus:outline-none w-0"/>
                            <span class="text-xs text-gray-500 pr-2 font-bold">包</span>
                        </div>
                    </div>
                </div>
                {(bVal||pVal)&&isBagUnit&&(
                    <p class="text-[10px] text-teal-700 font-bold">
                        = {parseInt(bVal)||0}袋 × {ppb} + {parseInt(pVal)||0}包 = <span class="text-teal-500">{totalInput} 包</span>

                    </p>
                )}

        return (
            <div key={item.id} class="bg-gray-900 p-4 rounded-2xl border border-gray-800 card-hover">
                {/* 品項名稱 + 庫存顯示 */}

                    <div class="flex-1">
                        <p class="font-bold text-gray-100 text-sm">{item.name}</p>
                        {isBagUnit ? (
                            <div class="mt-1.5">
                                <div class="flex items-baseline gap-1.5">
                                    <span class={"text-2xl font-black "+(isLow?"text-red-400 animate-pulse":"text-emerald-400")}>{bags}</span>
                                    <span class={"text-sm font-bold "+(isLow?"text-red-400":"text-emerald-600")}>袋</span>
                                    <span class={"text-xl font-black "+(isLow?"text-red-300 animate-pulse":"text-emerald-300")}>{rem}</span>
                                    <span class={"text-sm font-bold "+(isLow?"text-red-300":"text-emerald-500")}>包</span>
                                </div>
                                <p class="text-[10px] text-gray-600 mt-0.5">共 {packs} 包 ／ {ppb}包=1袋</p>
                            </div>
                        ) : (
                            <div class="mt-1.5 flex items-baseline gap-1">
                                <span class={"text-2xl font-black "+(isLow?"text-red-400 animate-pulse":"text-emerald-400")}>{packs}</span>
                                <span class="text-sm text-gray-500">包</span>
                            </div>
                        )}
                        {isLow&&<span class="text-[10px] bg-red-950/60 text-red-400 border border-red-900 px-1.5 py-0.5 rounded-full font-bold mt-1 inline-block">⚠️ 補貨</span>}
                    </div>
                    {/* 右側快速按鈕 */}
                    <div class="flex flex-col gap-1 ml-2">
                        {isBagUnit&&(
                            <div class="flex gap-1">
                                <button onClick={()=>handleBagClick(item.id,item.name,-1)} class="px-2 h-8 bg-gray-800 active:bg-gray-700 text-gray-400 font-bold rounded-lg text-xs">-袋</button>
                                <button onClick={()=>handleBagClick(item.id,item.name,1)} class="px-2 h-8 bg-gray-800 active:bg-gray-700 text-emerald-400 font-bold rounded-lg text-xs">+袋</button>
                            </div>
                        )}
                        <div class="flex gap-1">
                            <button onClick={()=>handlePackClick(item.id,item.name,-1)} class="px-2 h-8 bg-gray-800 active:bg-gray-700 text-gray-500 font-bold rounded-lg text-xs">-包</button>
                            <button onClick={()=>handlePackClick(item.id,item.name,1)} class="px-2 h-8 bg-gray-800 active:bg-gray-700 text-teal-400 font-bold rounded-lg text-xs">+包</button>
                        </div>
                    </div>
                </div>

                {/* 輸入區 */}
                {LOGISTICS_BRANCHES.includes(currentBranch) ? (
                    <div class="border-t border-gray-800 pt-3 space-y-2">
                        {renderDualInput()}
                        <div class="flex gap-2">
                            <select value={tgt} onChange={e=>setShipToBranches(p=>({...p,[item.id]:e.target.value}))}
                                class="flex-1 px-2 py-2 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-300 focus:outline-none">
                                {targets.map(t=><option key={t} value={t}>🚚 {t}</option>)}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onClick={()=>handleCustomInput(item.id,item.name)} class="py-2 bg-gray-800 text-gray-400 font-bold rounded-xl text-xs">僅改本庫存</button>
                            <button onClick={()=>handleShipment(item.id,item.name)} class="py-2 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-xl text-xs">確認出貨轉運</button>

                        {renderDualInput()}
                        <button onClick={()=>handleCustomInput(item.id,item.name)} class="w-full py-2 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-xl text-xs">確認修改</button>
                    </div>

        );

            <div class="text-center py-16 text-gray-500"><p class="text-4xl mb-3">🏭</p><p>銷售倒扣僅限自強店／玉山店／水上店</p></div>

                        <p><span class="bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded text-[10px] font-bold mr-2">Uber</span>直接匯出 CSV</p>

                            <div class="space-y-1 max-h-44 overflow-y-auto">

                                        <div class="flex items-center gap-1.5">
                                            {row.source&&<span class="text-[9px] bg-gray-800 text-gray-500 px-1 rounded">{row.source}</span>}
                                            <span class={"text-[10px] px-1.5 py-0.5 rounded font-bold "+(row.size==='XL'?"bg-purple-900/50 text-purple-300":"bg-blue-900/50 text-blue-300")}>{row.size}</span>
                                            <span class="text-emerald-400 font-bold">×{row.qty}</span>
                                            {!row.product&&<span class="text-red-400 text-[10px]">未識別</span>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            {deductSummary.unmatched.length>0&&(
                                <p class="text-xs text-amber-400 mt-2 bg-amber-950/30 px-2 py-1.5 rounded-lg border border-amber-900/50">
                                    ⚠️ {deductSummary.unmatched.length} 筆未識別（不扣庫存）：{deductSummary.unmatched.slice(0,3).join('、')}{deductSummary.unmatched.length>3?'...':''}
                                </p>
                            )}
                        </div>
                        <div class="bg-gray-900 border border-teal-900/50 rounded-2xl p-4">
                            <p class="text-sm font-bold text-teal-300 mb-1">🧮 預計倒扣（{currentBranch}）</p>
                            <p class="text-[10px] text-gray-600 mb-3">直接扣除包數，精準計算</p>
                            <div class="space-y-2">
                                {Object.entries(deductSummary.summary).map(([id,info])=>{
                                    const {consumed,curPacks,remPacks,curD,remD}=info;
                                    const noChange=consumed<=0;
                                    const isLow=remPacks<=LOW_STOCK_PACKS;
                                    return(
                                        <div key={id} class={"px-3 py-2.5 rounded-xl "+(noChange?"bg-gray-900 border border-gray-800 opacity-40":isLow?"bg-red-950/30 border border-red-900/50":"bg-gray-950")}>
                                            <div class="flex justify-between items-center">
                                                <span class="text-sm font-semibold text-gray-200">{ING_NAMES[id]||id}</span>
                                                <div class="flex items-center gap-1.5 text-xs">
                                                    <span class="text-gray-500">{curD.bags}袋{curD.rem}包</span>
                                                    <span class="text-red-500 font-bold">-{consumed}包</span>
                                                    <span class="text-gray-600">→</span>
                                                    <span class={"font-black text-base "+(isLow?"text-red-400":"text-emerald-400")}>{remD.bags}袋{remD.rem}包</span>
                                                </div>
                                            </div>
                                            <p class="text-[10px] text-gray-700 mt-0.5">{curPacks}包 − {consumed}包 = {remPacks}包（{remD.bags}袋{remD.rem}包）</p>
                                            {isLow&&<p class="text-[10px] text-red-500 mt-0.5">⚠️ 倒扣後庫存偏低，請注意補貨</p>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        <button onClick={handleConfirmDeduct} class="w-full py-3.5 bg-gradient-to-r from-teal-600 to-emerald-600 text-white font-black rounded-2xl text-base shadow-lg">
                            ✅ 確認倒扣【{currentBranch}】庫存
                        </button>
                        <button onClick={resetFile} class="w-full py-2.5 bg-gray-800 text-gray-500 font-bold rounded-2xl text-sm">取消</button>
                    </div>
                )}
                {deductDone&&(
                    <div class="bg-teal-950/50 border border-teal-700 rounded-2xl p-8 text-center">
                        <p class="text-5xl mb-3">✅</p>
                        <p class="text-teal-300 font-black text-xl">倒扣完成！</p>
                        <p class="text-gray-400 text-sm mt-2">【{currentBranch}】庫存已依銷售精準更新</p>
                        <button onClick={resetFile} class="mt-5 px-8 py-2.5 bg-teal-700 text-white font-bold rounded-2xl text-sm">再上傳一份</button>
                    </div>
                )}
            </div>
        );
    };

    // ── 每月結算 ──
    const renderMonthly=()=>{
        const data=calcMonthly();
        return(
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-gray-500 font-bold block mb-1">月份</label>
                    <input type="month" value={monthFilter} onChange={e=>setMonthFilter(e.target.value)} class="w-full p-2.5 bg-gray-900 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none focus:border-teal-500"/></div>
                    <div><label class="text-xs text-gray-500 font-bold block mb-1">分店</label>
                    <select value={monthBranch} onChange={e=>setMonthBranch(e.target.value)} class="w-full p-2.5 bg-gray-900 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none">
                        {ALL_BRANCHES.map(b=><option key={b} value={b}>{b}</option>)}
                    </select></div>
                </div>
                <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-800 flex justify-between items-center">
                        <p class="text-sm font-bold text-gray-300">📊 {monthFilter} {monthBranch}</p>
                        <p class="text-xs text-gray-600">{data.length} 項原料（單位：包）</p>
                    </div>
                    {data.length===0?(
                        <p class="text-center text-gray-600 text-sm py-8">該月份無異動紀錄</p>
                    ):(
                        <div class="divide-y divide-gray-800">
                            <div class="grid grid-cols-4 px-4 py-2 text-[10px] text-gray-600 font-bold uppercase">
                                <span>品項</span><span class="text-center text-blue-500">進貨(包)</span><span class="text-center text-amber-500">倒扣(包)</span><span class="text-center text-red-500">消耗(包)</span>
                            </div>
                            {data.map((r,i)=>(
                                <div key={i} class="grid grid-cols-4 px-4 py-2.5 text-xs hover:bg-gray-800/50">
                                    <span class="text-gray-300 font-semibold truncate">{r.item}</span>
                                    <span class="text-center text-blue-400 font-bold">{r.inPacks>0?'+'+r.inPacks:'-'}</span>
                                    <span class="text-center text-amber-400 font-bold">{r.deductPacks>0?'-'+r.deductPacks:'-'}</span>
                                    <span class="text-center text-red-400 font-bold">{r.outPacks>0?'-'+r.outPacks:'-'}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        );
    };

    // ── 管理後台 ──
    const renderAdmin=()=>{
        if(activeUser?.role!=='boss')return(<div class="text-center py-16 text-gray-500"><p class="text-4xl mb-3">🔒</p><p>僅限老闆使用</p></div>);
        const userList=Object.entries(users).filter(([k])=>k!=='__v2_migrated');
        return(
            <div class="space-y-4">
                <div class="flex gap-2">
                    {[['users','👥 員工列表'],['add',editUser?'✏️ 編輯':'➕ 新增']].map(([t,l])=>(
                        <button key={t} onClick={()=>{setAdminTab(t);if(t==='add'&&!editUser)setNewUser({id:'',password:'',name:'',role:'staff',branches:['自強店'],active:true});}}
                            class={"flex-1 py-2.5 rounded-xl font-bold text-sm border "+(adminTab===t?"bg-teal-600 text-white border-teal-500":"bg-gray-900 text-gray-500 border-gray-800")}>{l}</button>
                    ))}
                </div>
                {adminMsg&&<div class="p-3 bg-teal-950/50 border border-teal-800 rounded-xl text-teal-300 text-sm text-center font-bold">{adminMsg}</div>}
                {adminTab==='users'&&(
                    <div class="space-y-2">
                        {userList.sort(([,a],[,b])=>['boss','manager','staff'].indexOf(a.role)-['boss','manager','staff'].indexOf(b.role)).map(([uid,u])=>(
                            <div key={uid} class={"flex items-center justify-between p-3 rounded-2xl border "+(u.active?"bg-gray-900 border-gray-800":"bg-gray-950 border-gray-900 opacity-50")}>
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class={"text-xs font-bold "+ROLE_COLOR[u.role]}>{ROLE_LABEL[u.role]}</span>
                                        <span class="text-sm font-bold text-gray-200">{u.name}</span>
                                        <span class="text-xs text-gray-600 font-mono">({uid})</span>
                                    </div>
                                    <p class="text-[10px] text-gray-600 mt-0.5">{(u.branches||[]).join('、')}</p>
                                </div>
                                <div class="flex gap-1.5">
                                    <button onClick={()=>startEdit(uid)} class="px-2.5 py-1.5 bg-gray-800 text-gray-400 text-xs font-bold rounded-lg">編輯</button>
                                    <button onClick={()=>handleToggleUser(uid)} class={"px-2.5 py-1.5 text-xs font-bold rounded-lg "+(u.active?"bg-amber-950/50 text-amber-400":"bg-teal-950/50 text-teal-400")}>{u.active?'停用':'啟用'}</button>
                                    {uid!==activeUser?.id&&<button onClick={()=>handleDeleteUser(uid)} class="px-2.5 py-1.5 bg-red-950/50 text-red-400 text-xs font-bold rounded-lg">刪除</button>}
                                </div>
                            </div>
                        ))}
                    </div>
                )}
                {adminTab==='add'&&(
                    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4 space-y-3">
                        <p class="text-sm font-bold text-gray-300">{editUser?'編輯：'+editUser:'新增帳號'}</p>
                        {[['帳號ID',{value:newUser.id,disabled:!!editUser,onChange:e=>setNewUser(p=>({...p,id:e.target.value}))}],
                          ['顯示名稱',{value:newUser.name,onChange:e=>setNewUser(p=>({...p,name:e.target.value}))}],
                          ['密碼',{value:newUser.password,onChange:e=>setNewUser(p=>({...p,password:e.target.value}))}]
                        ].map(([label,props])=>(
                            <div key={label}><label class="text-xs text-gray-500 font-bold block mb-1">{label}</label>
                            <input {...props} class={"w-full px-3 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none focus:border-teal-500 "+(props.disabled?"opacity-50 cursor-not-allowed":"")}/></div>
                        ))}
                        <div><label class="text-xs text-gray-500 font-bold block mb-1">角色</label>
                        <select value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))} class="w-full px-3 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none">
                            <option value="boss">👑 老闆</option><option value="manager">🏪 店長</option><option value="staff">👤 員工</option>
                        </select></div>
                        <div><label class="text-xs text-gray-500 font-bold block mb-2">可存取分店</label>
                        <div class="grid grid-cols-2 gap-2">
                            {ALL_BRANCHES.map(b=>{const checked=(newUser.branches||[]).includes(b);return(
                                <button key={b} onClick={()=>setNewUser(p=>{const bs=p.branches||[];return {...p,branches:checked?bs.filter(x=>x!==b):[...bs,b]};})}
                                    class={"py-2 rounded-xl text-xs font-bold border "+(checked?"bg-teal-600 text-white border-teal-500":"bg-gray-950 text-gray-500 border-gray-800")}>{b}</button>
                            );})}
                        </div></div>
                        <button onClick={()=>setNewUser(p=>({...p,active:!p.active}))} class={"px-4 py-2 rounded-xl text-xs font-bold border "+(newUser.active?"bg-teal-950/50 text-teal-400 border-teal-800":"bg-gray-800 text-gray-500 border-gray-700")}>{newUser.active?'✅ 啟用中':'⛔ 已停用'}</button>
                        <div class="flex gap-2 pt-1">
                            <button onClick={()=>{setAdminTab('users');setEditUser(null);setNewUser({id:'',password:'',name:'',role:'staff',branches:['自強店'],active:true});}} class="flex-1 py-2.5 bg-gray-800 text-gray-400 font-bold rounded-xl text-sm">取消</button>
                            <button onClick={handleSaveUser} class="flex-1 py-2.5 bg-teal-600 text-white font-bold rounded-xl text-sm">儲存</button>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // ── 歷史紀錄 ──
    const renderHistory=()=>{
        const logs=historyData[filterDate]?Object.values(historyData[filterDate]):[];
        return(
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                <p class="text-sm font-bold text-gray-300 mb-3">📜 歷史紀錄</p>
                <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} class="w-full p-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm text-gray-200 focus:outline-none focus:border-teal-500 mb-3"/>
                <div class="space-y-2 max-h-64 overflow-y-auto">
                    {logs.length===0?(<p class="text-center text-gray-600 text-xs py-6">該日期無紀錄</p>):
                    logs.slice().reverse().map((log,i)=>(
                        <div key={i} class="text-xs p-2.5 bg-gray-950 rounded-xl border border-gray-800 flex justify-between items-center">
                            <div class="flex-1 min-w-0 mr-2">
                                <span class="text-gray-600">[{log.time}]</span>{' '}
                                <span class="text-teal-400 font-bold">{log.branch}</span>{' '}
                                <span class="bg-gray-800 text-yellow-400 px-1 py-0.5 rounded text-[10px] font-mono font-bold">👤{log.operator||'---'}</span>{' '}
                                <span class="text-gray-300">{log.item}</span>
                            </div>
                            <div class="text-right shrink-0">
                                <span class="text-gray-600 mr-1 text-[10px]">({log.type})</span>
                                <span class={"font-bold "+(log.type.includes('入庫')||log.type.includes('轉運')?'text-blue-400':'text-amber-500')}>
                                    {log.type.includes('入庫')||log.type.includes('轉運')?'+':'-'}{log.amount}包
                                </span>
                                {log.display&&<span class="text-gray-600 ml-1 text-[10px]">({log.display})</span>}
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );
    };

    // ── 登入畫面 ──
    if(phase==='login')return(
        <div class="flex items-center justify-center min-h-screen bg-gray-950 px-4">
            <div class="w-full max-w-sm">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-teal-950/50 border-2 border-teal-800 rounded-3xl flex items-center justify-center mx-auto text-4xl mb-4">🍵</div>
                    <h1 class="text-2xl font-black text-gray-100">水之茶 庫存盤點</h1>
                    <p class="text-sm text-gray-500 mt-1">庫存管理系統</p>
                </div>
                <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 shadow-2xl">
                    <form onSubmit={handleLogin} class="space-y-4">
                        <div><label class="text-xs font-bold text-gray-500 uppercase block mb-1.5">帳號</label>
                        <input value={loginId} onChange={e=>setLoginId(e.target.value)} placeholder="請輸入帳號" class="w-full px-4 py-3 bg-gray-950 border border-gray-800 rounded-2xl text-sm text-gray-200 focus:outline-none focus:border-teal-500 font-mono" required/></div>
                        <div><label class="text-xs font-bold text-gray-500 uppercase block mb-1.5">密碼</label>
                        <input type="password" value={loginPw} onChange={e=>setLoginPw(e.target.value)} placeholder="請輸入密碼" class="w-full px-4 py-3 bg-gray-950 border border-gray-800 rounded-2xl text-sm text-gray-200 focus:outline-none focus:border-teal-500" required/></div>
                        {loginErr&&<p class="text-red-400 text-xs font-semibold text-center">{loginErr}</p>}
                        <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-teal-600 to-emerald-600 text-white font-black rounded-2xl text-base shadow-lg mt-2">登入系統</button>
                    </form>
                </div>
            </div>
        </div>
    );

    if(phase==='loading')return(
        <div class="flex items-center justify-center min-h-screen bg-gray-950">
            <div class="text-center"><p class="text-4xl mb-3">🍵</p><p class="text-teal-400 font-bold animate-pulse">載入中...</p></div>
        </div>
    );

    // ── 主畫面 ──
    const availableBranches=ALL_BRANCHES.filter(b=>(activeUser?.branches||[]).includes(b));
    const isBoss=activeUser?.role==='boss';

    return(
        <div class="max-w-md mx-auto pb-24">
            <div class="bg-gradient-to-r from-teal-700 to-emerald-700 px-5 py-5">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-xl font-black text-white">水之茶 庫存盤點 🍵</h1>
                        <div class="flex items-center gap-2 mt-1">
                            <span class={"text-xs font-bold "+ROLE_COLOR[activeUser?.role]}>{ROLE_LABEL[activeUser?.role]||''}</span>
                            <span class="text-white/80 text-xs">{activeUser?.name}</span>
                            <span class="text-white/50 text-[10px] font-mono">({activeUser?.id})</span>
                        </div>
                    </div>
                    <button onClick={handleLogout} class="text-xs bg-black/30 border border-white/20 px-3 py-1.5 rounded-xl text-white/80 font-bold">登出</button>
                </div>
            </div>

            <div class="px-4 pt-4 pb-2">
                <p class="text-[10px] font-bold text-gray-600 uppercase mb-2">選擇據點</p>
                <div class="grid grid-cols-3 gap-1.5">
                    {availableBranches.map(b=>(
                        <button key={b} onClick={()=>{setCurrentBranch(b);setStockTab('stock');resetFile();}}
                            class={"py-2 rounded-xl font-bold text-xs border transition-all "+(currentBranch===b?"bg-teal-600 text-white border-teal-500":"bg-gray-900 text-gray-500 border-gray-800")}>
                            {LOGISTICS_BRANCHES.includes(b)?'📦':'🏪'} {b}
                        </button>
                    ))}
                </div>
            </div>

            <div class="px-4 pb-3">
                <div class="flex gap-1.5 bg-gray-900 p-1.5 rounded-2xl border border-gray-800">
                    {[['stock','📦 庫存'],
                      ...(SALES_BRANCHES.includes(currentBranch)?[['sales','📊 銷售倒扣']]:[]),
                      ['monthly','📅 月結算'],
                      ...(isBoss?[['admin','⚙️ 後台']]:[]),
                    ].map(([t,l])=>(
                        <button key={t} onClick={()=>setMainTab(t)}
                            class={"flex-1 py-2 rounded-xl font-bold text-xs transition-all "+(mainTab===t?"tab-active text-white shadow-sm":"text-gray-500")}>
                            {l}
                        </button>
                    ))}
                </div>
            </div>

            {logMsg&&(
                <div class="mx-4 mb-3 p-3 bg-teal-950/80 text-teal-300 text-sm font-bold rounded-xl text-center border border-teal-800 backdrop-blur-md sticky top-2 z-50 shadow-lg">
                    {logMsg}
                </div>
            )}

            <div class="px-4">
                {mainTab==='stock'&&(
                    <>
                        {SALES_BRANCHES.includes(currentBranch)&&(
                            <div class="flex gap-2 mb-4">
                                {[['stock','📦 庫存管理'],['sales','📊 銷售倒扣']].map(([t,l])=>(
                                    <button key={t} onClick={()=>setStockTab(t)}
                                        class={"flex-1 py-2.5 rounded-xl font-bold text-sm border "+(stockTab===t?(t==='sales'?"bg-teal-600 text-white border-teal-500":"bg-gray-700 text-white border-gray-600"):"bg-gray-900 text-gray-500 border-gray-800")}>
                                        {l}
                                    </button>
                                ))}
                            </div>
                        )}
                        {stockTab==='sales'?renderSalesTab():(
                            <>
                                <div class="mb-6">
                                    <div class="flex items-center gap-2 mb-3">
                                        <span class="w-1 h-5 bg-teal-500 rounded-full"></span>
                                        <h2 class="text-base font-black text-gray-300">🧊 冷凍瓶支</h2>
                                    </div>
                                    <div class="space-y-3">{BOTTLE_ITEMS.map(renderItemCard)}</div>
                                </div>
                                <div class="mb-6">
                                    <div class="flex items-center gap-2 mb-3">
                                        <span class="w-1 h-5 bg-emerald-500 rounded-full"></span>
                                        <h2 class="text-base font-black text-gray-300">🛍️ 冷凍袋數</h2>
                                    </div>
                                    <div class="space-y-3">{BAG_ITEMS.map(renderItemCard)}</div>
                                </div>
                                {renderHistory()}
                            </>
                        )}
                    </>
                )}
                {mainTab==='sales'&&renderSalesTab()}
                {mainTab==='monthly'&&renderMonthly()}
                {mainTab==='admin'&&renderAdmin()}
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
