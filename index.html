<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水之茶 庫存app - 07實名追蹤版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-950 min-h-screen text-gray-100 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // 核心配方對照表：名稱關鍵字對應 id 與消耗袋數
        const RECIPE_MAP = {
            "西瓜": { id: "g_melon", packs: 1 },
            "酪梨": { id: "g_avocado", packs: 1 },
            "芒果": { id: "g_mango", packs: 1 },
            "芭樂": { id: "g_guava", packs: 1 },
            "綜合蔬果": { id: "g_veggie", packs: 1 },
            "綠豆": { id: "g_greenbean", packs: 1 },
            "百香": { id: "g_passion", packs: 1 }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDtrmXs36Ea5v7bEE2GEJiZPBAcoA2dPZs",
            authDomain: "water-tea-system.firebaseapp.com",
            databaseURL: "https://water-tea-system-default-rtdb.firebaseio.com",
            projectId: "water-tea-system",
            storageBucket: "water-tea-system.appspot.com",
            messagingSenderId: "1083980327427",
            appId: "1:1083980327427:web:9c79fa17cfce3d59a80e14"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function App() {
            // ... (保持你原有的 state 如 isLoggedIn, currentBranch, stockData 等)
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [currentBranch, setCurrentBranch] = React.useState('自強店');
            const [activeUser, setActiveUser] = React.useState('');
            const [stockData, setStockData] = React.useState({});
            const branches = ['原物料商店', '自強店', '玉山店', '水上店', '家裡凍庫', '民雄凍庫'];

            // 新增：CSV 解析處理函數
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n');
                    rows.forEach(row => {
                        const cols = row.split(',');
                        // 假設名稱在第3欄(index 2)，數量在第6欄(index 5)
                        const name = cols[2]; 
                        const qty = parseInt(cols[5]);
                        if (!name || isNaN(qty)) return;

                        const matchKey = Object.keys(RECIPE_MAP).find(k => name.includes(k));
                        if (matchKey) {
                            const { id, packs } = RECIPE_MAP[matchKey];
                            // 嚴格篩選：只有袋裝(g_)才扣，瓶支(b_)不理會
                            if (id.startsWith('g_')) {
                                database.ref(`stocks/${id}/${currentBranch}`).transaction(curr => (curr || 0) - (qty * packs));
                            }
                        }
                    });
                    alert('庫存扣減完成！');
                };
                reader.readAsText(file);
            };

            // ... (請將你原本的 useEffect, renderItemCard, login 等邏輯填補在這裡)

            return (
                <div class="max-w-md mx-auto p-4">
                    {/* 你的原始介面... */}
                    
                    {/* 新增功能區塊 */}
                    <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 my-6">
                        <h3 class="text-white font-bold mb-2">📥 匯入每日報表 (自動扣料)</h3>
                        <input type="file" accept=".csv" onChange={handleFileUpload} class="text-sm text-gray-400" />
                        <p class="text-xs text-gray-500 mt-2">系統會自動篩選並計算冷凍袋消耗，瓶支不計。</p>
                    </div>

                    {/* 你的原有內容... */}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
