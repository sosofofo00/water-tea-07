<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>水之茶 庫存app - 07實名追蹤版</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

</head>

<body class="bg-gray-950 min-h-screen text-gray-100 antialiased">



    <div id="root">

        <div class="flex items-center justify-center min-h-screen bg-gray-950">

            <p class="text-xl font-semibold text-teal-400 animate-pulse">水之茶系統驗證中...</p>

        </div>

    </div>



    <script type="text/babel">

        // 自動埋入羽哥的 Firebase 專案金鑰

        const firebaseConfig = {

            apiKey: "AIzaSyDtrmXs36Ea5v7bEE2GEJiZPBAcoA2dPZs",

            authDomain: "water-tea-system.firebaseapp.com",

            databaseURL: "https://water-tea-system-default-rtdb.firebaseio.com",

            projectId: "water-tea-system",

            storageBucket: "water-tea-system.appspot.com",

            messagingSenderId: "1083980327427",

            appId: "1:1083980327427:web:9c79fa17cfce3d59a80e14"

        };



        if (!firebase.apps.length) {

            firebase.initializeApp(firebaseConfig);

        }

        const database = firebase.database();

        const LOW_STOCK_ALERT = 10; // 低於 10 變紅字警示



        // 🧠 自動產生 001 到 020 的帳號密碼對照表

        const USER_CREDENTIALS = {};

        for (let i = 1; i <= 20; i++) {

            const userStr = String(i).padStart(3, '0'); // 變成 "001", "002"..."020"

            USER_CREDENTIALS[userStr] = userStr;        // 密碼跟帳號一樣

        }



        function App() {

            // 登入狀態與目前登入的帳號

            const [isLoggedIn, setIsLoggedIn] = React.useState(false);

            const [activeUser, setActiveUser] = React.useState('');

            const [username, setUsername] = React.useState('');

            const [password, setPassword] = React.useState('');

            const [loginError, setLoginError] = React.useState('');



            // 庫存系統狀態

            const [currentBranch, setCurrentBranch] = React.useState('自強店');

            const [stockData, setStockData] = React.useState({});

            const [historyData, setHistoryData] = React.useState({});

            const [loading, setLoading] = React.useState(true);

            const [logMessage, setLogMessage] = React.useState('');

            const [filterDate, setFilterDate] = React.useState(new Date().toISOString().split('T')[0]);

            

            const [inputValues, setInputValues] = React.useState({});

            const [shipToBranches, setShipToBranches] = React.useState({});



            const branches = ['原物料商店', '自強店', '玉山店', '水上店', '家裡凍庫', '民雄凍庫'];

            const logisticsBranches = ['原物料商店', '家裡凍庫', '民雄凍庫'];



            const bottleItems = [

                { id: 'b_orange', name: '柳橙 (瓶)' },

                { id: 'b_cane', name: '甘蔗 (瓶)' },

                { id: 'b_melon', name: '西瓜 (瓶)' },

                { id: 'b_lemon', name: '檸檬 (瓶)' },

                { id: 'b_kumquat', name: '金桔 (瓶)' },

                { id: 'b_pineapple', name: '鳳梨 (瓶)' }

            ];



            const bagItems = [

                { id: 'g_melon', name: '西瓜 (袋)' },

                { id: 'g_avocado', name: '酪梨 (袋)' },

                { id: 'g_mango', name: '芒果 (袋)' },

                { id: 'g_guava', name: '芭樂 (袋)' },

                { id: 'g_veggie', name: '綜合蔬果 (袋)' },

                { id: 'g_lotus_l', name: '石蓮花-大 (袋)' },

                { id: 'g_lotus_s', name: '石蓮花-小 (袋)' },

                { id: 'g_redbean', name: '紅豆 (袋)' },

                { id: 'g_greenbean', name: '綠豆 (袋)' },

                { id: 'g_passion', name: '百香果粒 (袋)' },

                { id: 'g_teabag', name: '水果茶包 (包)' }

            ];



            // 檢查本地有沒有登入紀錄

            React.useEffect(() => {

                const savedUser = localStorage.getItem('water_tea_logged_user');

                if (savedUser && USER_CREDENTIALS[savedUser]) {

                    setActiveUser(savedUser);

                    setIsLoggedIn(true);

                }

            }, []);



            React.useEffect(() => {

                if (!isLoggedIn) return;

                const stockRef = database.ref('stocks');

                const historyRef = database.ref('history');



                stockRef.on('value', (snapshot) => {

                    setStockData(snapshot.val() || {});

                    setLoading(false);

                });



                historyRef.on('value', (snapshot) => {

                    setHistoryData(snapshot.val() || {});

                });



                return () => {

                    stockRef.off();

                    historyRef.off();

                };

            }, [isLoggedIn]);



            // 登入驗證

            const handleLoginSubmit = (e) => {

                e.preventDefault();

                const trimUser = username.trim();

                const trimPass = password.trim();



                if (USER_CREDENTIALS[trimUser] && USER_CREDENTIALS[trimUser] === trimPass) {

                    localStorage.setItem('water_tea_logged_user', trimUser);

                    setActiveUser(trimUser);

                    setLoginError('');

                    setIsLoggedIn(true);

                } else {

                    setLoginError('❌ 帳號密碼錯誤！請輸入 001 到 020 之間的編號');

                }

            };



            // 登出

            const handleLogout = () => {

                if (window.confirm('確定要登出系統嗎？')) {

                    localStorage.removeItem('water_tea_logged_user');

                    setIsLoggedIn(false);

                    setActiveUser('');

                    setUsername('');

                    setPassword('');

                }

            };



            // 寫入歷史紀錄（包含操作者帳號）

            const writeLog = (dateStr, logPayload) => {

                const logId = new Date().getTime();

                // 把目前操作的帳號寫進資料庫日誌

                const finalPayload = {

                    ...logPayload,

                    operator: activeUser || '未知'

                };

                database.ref('history/' + dateStr + '/' + logId).set(finalPayload);

                

                const oneYearAgo = new Date();

                oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);

                const expiredDateStr = oneYearAgo.toISOString().split('T')[0];

                database.ref('history/' + expiredDateStr).remove();

            };



            const handleButtonClick = (itemId, itemName, change) => {

                if (change > 0 && !logisticsBranches.includes(currentBranch)) {

                    if (!window.confirm('確定要從非大庫房/總部增加庫存嗎？')) {

                        return;

                    }

                }



                const currentQty = (stockData[itemId] && stockData[itemId][currentBranch]) || 0;

                const newQty = Math.max(0, currentQty + change);

                const typeLabel = change > 0 ? '入庫/出貨' : '消耗';



                database.ref('stocks/' + itemId + '/' + currentBranch).set(newQty)

                    .then(() => {

                        const now = new Date();

                        writeLog(now.toISOString().split('T')[0], {

                            time: now.toTimeString().split(' ')[0].substring(0, 5),

                            branch: currentBranch,

                            item: itemName,

                            type: typeLabel,

                            amount: Math.abs(change),

                            result: newQty

                        });

                        setLogMessage('【' + itemName + '】庫存已更新！');

                        setTimeout(() => setLogMessage(''), 1200);

                    });

            };



            const handleCustomInputSubmit = (itemId, itemName) => {

                const inputValue = inputValues[itemId];

                if (!inputValue || parseInt(inputValue, 10) < 0) {

                    alert('請輸入大於或等於 0 的數字');

                    return;

                }



                const targetQty = parseInt(inputValue, 10);

                const currentQty = (stockData[itemId] && stockData[itemId][currentBranch]) || 0;

                

                if (targetQty > currentQty && !logisticsBranches.includes(currentBranch)) {

                    if (!window.confirm('確定要從非大庫房/總部增加庫存嗎？')) {

                        return;

                    }

                }



                const changeAmount = Math.abs(targetQty - currentQty);

                const typeLabel = targetQty > currentQty ? '鍵盤直改(增)' : '鍵盤直改(減)';



                database.ref('stocks/' + itemId + '/' + currentBranch).set(targetQty)

                    .then(() => {

                        const now = new Date();

                        writeLog(now.toISOString().split('T')[0], {

                            time: now.toTimeString().split(' ')[0].substring(0, 5),

                            branch: currentBranch,

                            item: itemName,

                            type: typeLabel,

                            amount: changeAmount,

                            result: targetQty

                        });

                        setLogMessage('【' + itemName + '】已重設為 ' + targetQty);

                        setTimeout(() => setLogMessage(''), 1200);

                        setInputValues(prev => ({ ...prev, [itemId]: '' }));

                    });

            };



            const handleShipmentSubmit = (itemId, itemName) => {

                const inputValue = inputValues[itemId];

                if (!inputValue || parseInt(inputValue, 10) <= 0) {

                    alert('請輸入大於 0 的出貨數量');

                    return;

                }



                const shipQty = parseInt(inputValue, 10);

                const availableTargets = branches.filter(b => b !== currentBranch);

                const targetStore = shipToBranches[itemId] || availableTargets[0];



                if (targetStore === currentBranch) {

                    alert('出貨目的地不能與當前所在地相同！');

                    return;

                }



                const storeStock = stockData[itemId] || {};

                const currentSourceQty = storeStock[currentBranch] || 0;

                const currentTargetQty = storeStock[targetStore] || 0;



                if (currentSourceQty < shipQty) {

                    if (!window.confirm(currentBranch + '庫存不足（現有:' + currentSourceQty + '），確定強制出貨嗎？（本庫將歸零）')) {

                        return;

                    }

                }



                const newSourceQty = Math.max(0, currentSourceQty - shipQty);

                const newTargetQty = currentTargetQty + shipQty;



                const updates = {};

                updates['stocks/' + itemId + '/' + currentBranch] = newSourceQty;

                updates['stocks/' + itemId + '/' + targetStore] = newTargetQty;



                database.ref().update(updates)

                    .then(() => {

                        const now = new Date();

                        writeLog(now.toISOString().split('T')[0], {

                            time: now.toTimeString().split(' ')[0].substring(0, 5),

                            branch: currentBranch,

                            item: itemName,

                            type: '🚚轉運至' + targetStore,

                            amount: shipQty,

                            result: newSourceQty

                        });



                        setLogMessage('🚀 ' + currentBranch + '已配發 ' + shipQty + ' 至 ' + targetStore);

                        setTimeout(() => setLogMessage(''), 2000);

                        setInputValues(prev => ({ ...prev, [itemId]: '' }));

                    })

                    .catch(err => alert('出貨失敗：' + err.message));

            };



            // 門禁密碼鎖畫面

            if (!isLoggedIn) {

                return (

                    <div class="flex items-center justify-center min-h-screen bg-gray-950 px-4">

                        <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-xl max-w-sm w-full">

                            <div class="text-center mb-6">

                                <div class="w-16 h-16 bg-teal-950/50 border border-teal-800 text-teal-400 rounded-2xl flex items-center justify-center mx-auto text-2xl font-bold mb-2">🔒</div>

                                <h1 class="text-xl font-bold text-gray-100">水之茶 實名系統</h1>

                                <p class="text-xs text-gray-500 mt-1">請輸入專屬三碼員工編號登入</p>

                            </div>

                            

                            <form onSubmit={handleLoginSubmit} class="space-y-4">

                                <div>

                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">員工帳號 (三碼)</label>

                                    <input 

                                        type="text" 

                                        pattern="[0-9]*"

                                        inputmode="numeric"

                                        placeholder="例如: 001" 

                                        value={username}

                                        onChange={(e) => setUsername(e.target.value)}

                                        class="w-full px-3 py-2.5 bg-gray-950 border border-gray-800 rounded-xl text-sm focus:outline-none focus:border-teal-500 text-gray-200 font-mono tracking-widest text-center text-lg"

                                        required

                                    />

                                </div>

                                <div>

                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">驗證密碼</label>

                                    <input 

                                        type="password" 

                                        pattern="[0-9]*"

                                        inputmode="numeric"

                                        placeholder="例如: 001" 

                                        value={password}

                                        onChange={(e) => setPassword(e.target.value)}

                                        class="w-full px-3 py-2.5 bg-gray-950 border border-gray-800 rounded-xl text-sm focus:outline-none focus:border-teal-500 text-gray-200 font-mono tracking-widest text-center text-lg"

                                        required

                                    />

                                </div>



                                {loginError && <p class="text-xs font-semibold text-red-400 text-center">{loginError}</p>}



                                <button 

                                    type="submit" 

                                    class="w-full py-2.5 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-xl text-sm shadow-md cursor-pointer transition-all text-center text-base"

                                >

                                    驗證身分並解鎖

                                </button>

                            </form>

                        </div>

                    </div>

                );

            }



            if (loading) {

                return (

                    <div class="flex items-center justify-center min-h-screen bg-gray-950">

                        <p class="text-xl font-semibold text-teal-400 animate-pulse">📡 正在同步雲端數據中...</p>

                    </div>

                );

            }



            const dayLogs = historyData[filterDate] ? Object.values(historyData[filterDate]) : [];



            const renderItemCard = (item) => {

                const qty = (stockData[item.id] && stockData[item.id][currentBranch]) || 0;

                const isLow = qty <= LOW_STOCK_ALERT;

                const currentInputValue = inputValues[item.id] || '';

                

                const availableTargets = branches.filter(b => b !== currentBranch);

                const selectedTargetStore = shipToBranches[item.id] || availableTargets[0];



                return (

                    <div key={item.id} class="bg-gray-900 p-4 rounded-xl shadow-md border border-gray-800 flex flex-col space-y-3">

                        <div class="flex items-center justify-between">

                            <div>

                                <h3 class="font-bold text-gray-100 text-lg">{item.name}</h3>

                                <p class="text-sm text-gray-400 mt-0.5">

                                    目前庫存：

                                    <span class={"font-bold text-2xl ml-1 " + (isLow ? "text-red-400 animate-pulse" : "text-emerald-400")}>

                                        {qty}

                                    </span>

                                    {isLow && <span class="text-[10px] text-red-400 font-bold ml-2 bg-red-950/50 px-1.5 py-0.5 rounded border border-red-900">補貨</span>}

                                </p>

                            </div>

                            <div class="flex items-center space-x-1">

                                <button onClick={function() { handleButtonClick(item.id, item.name, -1); }} class="w-9 h-9 bg-gray-800 active:bg-gray-700 text-gray-300 font-bold rounded-lg text-sm flex items-center justify-center shadow-sm">-1</button>

                                <button onClick={function() { handleButtonClick(item.id, item.name, 1); }} class="w-9 h-9 bg-gray-800 active:bg-gray-700 text-emerald-400 font-bold rounded-lg text-sm flex items-center justify-center shadow-sm">+1</button>

                            </div>

                        </div>



                        {logisticsBranches.includes(currentBranch) ? (

                            <div class="pt-2.5 border-t border-dashed border-gray-800 flex flex-col space-y-2">

                                <div class="flex items-center space-x-1.5">

                                    <input 

                                        type="number" 

                                        pattern="[0-9]*"

                                        inputmode="numeric"

                                        placeholder="數量" 

                                        value={currentInputValue}

                                        onChange={function(e) { setInputValues(prev => ({ ...prev, [item.id]: e.target.value })); }}

                                        class="w-1/2 px-2.5 py-1.5 border border-gray-700 rounded-lg text-sm bg-gray-950 text-gray-100 focus:outline-none focus:border-teal-500 font-medium placeholder-gray-600"

                                    />

                                    <select 

                                        value={selectedTargetStore}

                                        onChange={function(e) { setShipToBranches(prev => ({ ...prev, [item.id]: e.target.value })); }}

                                        class="w-1/2 px-2 py-1.5 border border-gray-700 rounded-lg text-sm bg-gray-950 focus:outline-none text-gray-300 font-semibold"

                                    >

                                        {availableTargets.map(st => <option key={st} value={st}>🚚 移至 {st}</option>)}

                                    </select>

                                </div>

                                <div class="grid grid-cols-2 gap-2">

                                    <button 

                                        onClick={function() { handleCustomInputSubmit(item.id, item.name); }}

                                        class="py-1.5 bg-gray-800 active:bg-gray-700 text-gray-400 font-bold rounded-lg text-xs text-center"

                                    >

                                        僅改本庫存

                                    </button>

                                    <button 

                                        onClick={function() { handleShipmentSubmit(item.id, item.name); }}

                                        class="py-1.5 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-lg text-xs text-center shadow-sm"

                                    >

                                        確認出貨轉運

                                    </button>

                                </div>

                            </div>

                        ) : (

                            <div class="flex items-center space-x-2 pt-2 border-t border-dashed border-gray-800">

                                <input 

                                    type="number" 

                                    pattern="[0-9]*"

                                    inputmode="numeric"

                                    placeholder="輸入新庫存數量" 

                                    value={currentInputValue}

                                    onChange={function(e) { setInputValues(prev => ({ ...prev, [item.id]: e.target.value })); }}

                                    class="flex-1 px-3 py-1.5 border border-gray-700 rounded-lg text-sm bg-gray-950 text-gray-100 focus:outline-none focus:border-teal-500 font-medium placeholder-gray-600"

                                />

                                <button 

                                    onClick={function() { handleCustomInputSubmit(item.id, item.name); }}

                                    class="px-3 py-1.5 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-lg text-xs shadow-sm"

                                >

                                    確認修改

                                </button>

                            </div>

                        )}

                    </div>

                );

            };



            return (

                <div class="max-w-md mx-auto p-4 sm:p-6 pb-12">

                    {/* 頂部控制面板 */}

                    <div class="bg-gradient-to-r from-teal-700 to-emerald-700 text-white p-6 rounded-2xl shadow-lg mb-6 text-center border border-teal-600/30 relative">

                        <h1 class="text-2xl font-bold tracking-wider">水之茶 庫存app</h1>

                        <p class="text-xs opacity-95 mt-1 bg-black/20 inline-block px-3 py-1 rounded-full border border-white/10">

                            👤 當前操作者：<span class="font-mono font-bold text-yellow-300 text-sm">{activeUser}</span>

                        </p>

                        

                        <button 

                            onClick={handleLogout} 

                            class="absolute top-3 right-3 text-[10px] bg-black/40 hover:bg-black/60 border border-white/15 px-2 py-1 rounded-md text-gray-200 font-semibold active:scale-95 transition-all"

                        >

                            更換帳號 🔓

                        </button>

                    </div>



                    {/* 切換據點按鈕 */}

                    <div class="mb-6">

                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">請選擇目前查看據點：</label>

                        <div class="grid grid-cols-2 gap-2">

                            {branches.map(function(b) {

                                const isLogistics = logisticsBranches.includes(b);

                                return (

                                    <button

                                        key={b}

                                        onClick={function() { setCurrentBranch(b); }}

                                        class={"p-3 rounded-xl font-bold text-sm shadow-sm transition-all border " + (currentBranch === b ? "bg-teal-600 text-white border-teal-500 shadow-teal-900/50" : "bg-gray-900 text-gray-400 border-gray-800")}

                                    >

                                        {isLogistics ? '📦 ' : '🏪 '} {b}

                                    </button>

                                );

                            })}

                        </div>

                    </div>



                    {/* 快顯彈出訊息 */}

                    {logMessage && (

                        <div class="sticky top-4 z-50 mb-4 p-2.5 bg-teal-950/80 text-teal-300 text-sm font-semibold rounded-xl text-center shadow-lg border border-teal-800 backdrop-blur-md">

                            {logMessage}

                        </div>

                    )}



                    {/* 區塊一：冷凍瓶支 */}

                    <div class="mb-8">

                        <div class="flex items-center justify-between mb-3 pl-1">

                            <h2 class="text-lg font-bold text-gray-300 flex items-center gap-1.5">

                                <span class="w-1.5 h-5 bg-teal-500 rounded-full"></span>

                                🧊 冷凍瓶支

                            </h2>

                        </div>

                        <div class="space-y-3">

                            {bottleItems.map(renderItemCard)}

                        </div>

                    </div>



                    {/* 區塊二：冷凍袋數 */}

                    <div class="mb-8">

                        <div class="flex items-center justify-between mb-3 pl-1">

                            <h2 class="text-lg font-bold text-gray-300 flex items-center gap-1.5">

                                <span class="w-1.5 h-5 bg-teal-500 rounded-full"></span>

                                🛍️ 冷凍袋數

                            </h2>

                        </div>

                        <div class="space-y-3">

                            {bagItems.map(renderItemCard)}

                        </div>

                    </div>



                    {/* 區塊三：日誌歷史追溯 */}

                    <div class="bg-gray-900 p-4 rounded-xl shadow-md border border-gray-800">

                        <h2 class="text-base font-bold text-gray-300 mb-3 flex items-center gap-1.5">📜 異動與叫貨歷史追溯</h2>

                        <div class="mb-4">

                            <label class="block text-xs font-bold text-gray-500 mb-1">選擇查詢日期：</label>

                            <input type="date" value={filterDate} onChange={function(e) { setFilterDate(e.target.value); }} class="w-full p-2 border border-gray-700 rounded-lg text-sm bg-gray-950 text-gray-200 font-medium focus:outline-none focus:border-teal-500" />

                        </div>

                        <div class="space-y-2 max-h-60 overflow-y-auto pr-1">

                            {dayLogs.length === 0 ? (

                                <p class="text-center text-xs text-gray-500 py-4">📅 該日期沒有任何庫存叫貨紀錄</p>

                            ) : (

                                dayLogs.slice().reverse().map(function(log, index) {

                                    return (

                                        <div key={index} class="text-xs p-2 bg-gray-950 rounded-lg border border-gray-800 flex justify-between items-center">

                                            <div>

                                                <span class="text-gray-500">[{log.time}]</span>{' '}

                                                <span class="font-bold text-teal-400">{log.branch}</span>{' '}

                                                {/* 🪙 這裡會清楚顯示是哪一個帳號操作的 */}

                                                <span class="bg-gray-800 text-yellow-400 px-1 py-0.5 rounded text-[10px] font-mono font-bold mr-1">

                                                    👤{log.operator || '---'}

                                                </span>{' '}

                                                <span class="text-gray-300">{log.item}</span>

                                            </div>

                                            <div class="text-right">

                                                <span class="text-gray-500 mr-2">({log.type})</span>

                                                <span class={"font-bold " + (log.type.includes('增') || log.type.includes('轉運') || log.type === '入庫/出貨' ? "text-blue-400" : "text-amber-500")}>

                                                    {log.type.includes('增') || log.type.includes('轉運') || log.type === '入庫/出貨' ? '+' : '-'}{log.amount}

                                                </span>

                                                <span class="text-gray-500 ml-1">(餘:{log.result})</span>

                                            </div>

                                        </div>

                                    );

                                })

                            )}

                        </div>

                    </div>



                </div>

            );

        }



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<App />);

    </script>

</body>

</html>
