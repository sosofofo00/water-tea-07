        };

        // ========== 每袋包數換算表 ==========
        // 庫存單位是「袋」，這裡定義每袋有幾包
        // 倒扣邏輯：每杯消耗 N 包 → 累積總包數 ÷ 每袋包數，無條件捨去 = 扣幾袋
        const PACKS_PER_BAG = {
            // 64包/袋：柳橙、甘蔗、西瓜、綜合蔬果
            b_orange:    64,  // 柳橙（瓶）— 保留舊key避免錯誤
            b_cane:      64,  // 甘蔗（瓶）— 保留舊key避免錯誤

            g_cane:      64,  // 甘蔗（袋）
            b_melon:     64,  // 西瓜（瓶）
            g_melon:     64,  // 西瓜（袋）
            g_veggie:    64,  // 綜合蔬果（袋）
            // 48包/袋：酪梨、芭樂、芒果、木瓜(g_papaya)、草莓、百香、綠豆、石蓮花、紅豆
            g_avocado:   48,
            g_guava:     48,
            g_mango:     48,
            g_papaya:    48,  // 木瓜牛奶專用（獨立原料）
            g_strawberry: 48, // 草莓系列，48包=1袋
            g_greenbean: 48,

            g_lotus_s:   48,
            g_redbean:   48,
            g_passion:   48,
            // 水果茶包本身計包，1包=1單位
            g_teabag:     1,
            // 其他瓶類（檸檬、金桔、鳳梨）暫設1
            b_lemon:      1,
            b_kumquat:    1,
            b_pineapple:  1,
        };

        // 解析 CSV 一行的品項名稱 → 找到 DEDUCT_RULES 的 key
        function matchProduct(rawName) {
            const clean = rawName.replace(/\s+/g, '').replace(/[Ｌlｌ]$/i, '').replace(/[XxＸ][Ll]/i, '').trim();
            for (const key of Object.keys(DEDUCT_RULES)) {
                if (clean.includes(key) || key.includes(clean)) return key;
            }
            // 模糊：找包含關係
            for (const key of Object.keys(DEDUCT_RULES)) {
                if (rawName.includes(key)) return key;
            }
            return null;
        }

        // 解析杯型
        function matchSize(rawName, sizeCol) {
            const combined = (rawName + ' ' + (sizeCol || '')).toUpperCase();
            if (/XL|特大/.test(combined)) return 'XL';
            if (/\bL\b|大杯/.test(combined)) return 'L';
            // 嘗試從品名結尾抓
            if (/XL$|特大$/.test(rawName.replace(/\s/g,''))) return 'XL';
            return 'L'; // 預設 L
        }

        // 切割 CSV 行（支援引號內有逗號或換行）
        function splitCSVLine(line) {
            const result = [];
            let cur = '', inQ = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') { inQ = !inQ; }
                else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
                else { cur += ch; }
            }
            result.push(cur.trim());
            return result;
        }

        // 完整 CSV 解析（處理跨行引號，回傳 row 陣列的陣列）
        function parseCSVRows(text) {
            const rows = [];
            let cur = '', inQ = false, row = [];
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                if (ch === '"') {
                    if (inQ && text[i+1] === '"') { cur += '"'; i++; } // escaped quote
                    else { inQ = !inQ; }
                } else if (ch === ',' && !inQ) {
                    row.push(cur.trim()); cur = '';
                } else if ((ch === '\n') && !inQ) {
                    row.push(cur.trim()); cur = '';
                    rows.push(row); row = [];
                } else if (ch === '\r') {
                    // skip \r
                } else {
                    cur += ch;
                }
            }
            if (cur || row.length) { row.push(cur.trim()); rows.push(row); }
            return rows;
        }

        // 偵測並解析三種格式 → [{product, size, qty, rawName, source}] | null
        function parseCSV(text) {
            // 移除 BOM
            const clean = text.replace(/^\uFEFF/, '');
            const lines = clean.split(/\r?\n/);

            // ── 格式 A：熊貓 ──
            // 標頭：餐點,總額(杯數),銷售(金額)  → 杯數在 index 1，金額在 index 2
            const firstLine = lines[0] || '';
            if (/餐點.*總額.*銷售/.test(firstLine)) {
                const results = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = splitCSVLine(lines[i]);
                    if (!cols[0]) continue;
                    const rawName = cols[0].trim();
                    const qty = parseInt(cols[1], 10);  // ← col[1] 才是杯數
                    if (!qty || qty <= 0) continue;
                    const sizeStr = /特大杯/.test(rawName) ? 'XL' : 'L';
                    const cleanName = rawName.replace(/\s*\(.*?\)/g, '').trim();
                    const product = matchProduct(cleanName) || matchProduct(rawName);
                    results.push({ product, size: sizeStr, qty, rawName, source: '熊貓' });
                }
                return results.length > 0 ? results : null;
            }

            // ── 格式 B：Uber ──
            // 標頭第7欄=商品名稱，第15欄=最終數量；訂單主行商品名稱為空，子行有商品
            if (/訂單.*ID|商品名稱.*銷售單位/.test(firstLine)) {
                const header = splitCSVLine(lines[0]);
                const colProduct = header.findIndex(h => h === '商品名稱');
                const colQty = header.findIndex((h, idx) => h === '最終數量' && idx > 12); // 第15欄
                if (colProduct === -1) return null;
                const results = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = splitCSVLine(lines[i]);
                    const rawName = (cols[colProduct] || '').trim();
                    if (!rawName) continue;
                    const qty = parseInt(cols[colQty] || cols[14], 10);
                    if (!qty || qty <= 0) continue;
                    // Uber 無杯型欄，從品名猜（通常無標示，預設 L）
                    const size = matchSize(rawName, '');
                    const product = matchProduct(rawName);
                    results.push({ product, size, qty, rawName, source: 'Uber' });
                }
                return results.length > 0 ? results : null;
            }

            // ── 格式 C：POS（類別商品銷售排行榜）──
            // POS 有跨行引號儲存格，必須用完整 CSV 解析而非逐行 split
            if (/類別商品銷售排行榜|排行榜/.test(lines.slice(0,5).join(''))) {
                // 重新用完整 CSV parser 解析整份文字
                const allRows = parseCSVRows(clean);
                const results = [];
                let colName = 4, colQty = 7;
                // 找標頭行定位欄位
                for (const row of allRows) {
                    if (row[4] && /商品名稱/.test(row[4])) {
                        const cn = row.findIndex(c => /商品名稱/.test(c));
                        const cq = row.findIndex(c => /^數量$/.test(c.trim()));
                        if (cn >= 0) colName = cn;
                        if (cq >= 0) colQty = cq;
                        break;
                    }
                }
                for (const row of allRows) {
                    const rawName = (row[colName] || '').trim();
                    if (!rawName || /商品名稱|類別|排行|合計|主管|稽核/.test(rawName)) continue;
                    if (/^\d{4}\//.test(rawName) || rawName === '~') continue; // 日期行跳過
                    const qty = parseInt((row[colQty] || '').replace(/,/g, ''), 10);
                    if (!qty || qty <= 0) continue;
                    const size = /\[XL\]/.test(rawName) ? 'XL' : matchSize(rawName, '');
                    const cleanName = rawName.replace(/\[.*?\]/g, '').trim();
                    const product = matchProduct(cleanName) || matchProduct(rawName);
                    results.push({ product, size, qty, rawName, source: 'POS' });
                }
                return results.length > 0 ? results : null;
            }

            // ── 格式 D：自訂標準 CSV（品項名稱,杯型,數量）──
            const header = splitCSVLine(lines[0]);
            const colName2 = header.findIndex(h => /品項|品名|name|商品/.test(h));
            const colSize2 = header.findIndex(h => /杯型|size|規格|大小/.test(h));
            const colQty2  = header.findIndex(h => /數量|qty|quantity|杯數|count/.test(h));
            if (colName2 === -1 || colQty2 === -1) return null;
            const results = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = splitCSVLine(lines[i]);
                if (!cols[colName2]) continue;
                const rawName = cols[colName2];
                const sizeStr = colSize2 >= 0 ? cols[colSize2] : '';
                const qty = parseInt(cols[colQty2], 10);
                if (!qty || qty <= 0) continue;
                results.push({ product: matchProduct(rawName), size: matchSize(rawName, sizeStr), qty, rawName, source: '自訂' });
            }
            return results.length > 0 ? results : null;
        }

                { id: 'g_melon', name: '西瓜 (袋)' }, { id: 'g_avocado', name: '酪梨 (袋)' },
                { id: 'g_mango', name: '芒果 (袋)' }, { id: 'g_guava', name: '芭樂 (袋)' },
                { id: 'g_papaya', name: '木瓜 (袋)' }, { id: 'g_strawberry', name: '草莓 (袋)' },
                { id: 'g_veggie', name: '綜合蔬果 (袋)' }, { id: 'g_lotus_l', name: '石蓮花-大 (袋)' },
                { id: 'g_lotus_s', name: '石蓮花-小 (袋)' }, { id: 'g_redbean', name: '紅豆 (袋)' },
                { id: 'g_greenbean', name: '綠豆 (袋)' }, { id: 'g_passion', name: '百香果粒 (袋)' },
                { id: 'g_teabag', name: '水果茶包 (包)' }
            ];

            React.useEffect(() => {
                const saved = localStorage.getItem('water_tea_logged_user');
                if (saved && USER_CREDENTIALS[saved]) { setActiveUser(saved); setIsLoggedIn(true); }
            }, []);

            React.useEffect(() => {
                if (!isLoggedIn) return;
                const stockRef = database.ref('stocks');
                const historyRef = database.ref('history');
                stockRef.on('value', s => { setStockData(s.val() || {}); setLoading(false); });
                historyRef.on('value', s => setHistoryData(s.val() || {}));
                return () => { stockRef.off(); historyRef.off(); };
            }, [isLoggedIn]);

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                const u = username.trim(), p = password.trim();
                if (USER_CREDENTIALS[u] && USER_CREDENTIALS[u] === p) {
                    localStorage.setItem('water_tea_logged_user', u);
                    setActiveUser(u); setLoginError(''); setIsLoggedIn(true);
                } else { setLoginError('❌ 帳號密碼錯誤！請輸入 001 到 020 之間的編號'); }
            };

            const handleLogout = () => {
                if (window.confirm('確定要登出系統嗎？')) {
                    localStorage.removeItem('water_tea_logged_user');
                    setIsLoggedIn(false); setActiveUser(''); setUsername(''); setPassword('');
                }
            };

            const writeLog = (dateStr, logPayload) => {
                const logId = new Date().getTime();
                database.ref('history/' + dateStr + '/' + logId).set({ ...logPayload, operator: activeUser || '未知' });
                const oneYearAgo = new Date(); oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                database.ref('history/' + oneYearAgo.toISOString().split('T')[0]).remove();
            };

            const handleButtonClick = (itemId, itemName, change) => {
                if (change > 0 && !logisticsBranches.includes(currentBranch)) {
                    if (!window.confirm('確定要從非大庫房/總部增加庫存嗎？')) return;
                }
                const currentQty = (stockData[itemId] && stockData[itemId][currentBranch]) || 0;
                const newQty = Math.max(0, currentQty + change);
                const typeLabel = change > 0 ? '入庫/出貨' : '消耗';
                database.ref('stocks/' + itemId + '/' + currentBranch).set(newQty).then(() => {
                    const now = new Date();
                    writeLog(now.toISOString().split('T')[0], {
                        time: now.toTimeString().split(' ')[0].substring(0,5),
                        branch: currentBranch, item: itemName, type: typeLabel,
                        amount: Math.abs(change), result: newQty
                    });
                    setLogMessage('【' + itemName + '】庫存已更新！');
                    setTimeout(() => setLogMessage(''), 1200);
                });
            };

            const handleCustomInputSubmit = (itemId, itemName) => {
                const inputValue = inputValues[itemId];
                if (!inputValue || parseInt(inputValue, 10) < 0) { alert('請輸入大於或等於 0 的數字'); return; }
                const targetQty = parseInt(inputValue, 10);
                const currentQty = (stockData[itemId] && stockData[itemId][currentBranch]) || 0;
                if (targetQty > currentQty && !logisticsBranches.includes(currentBranch)) {
                    if (!window.confirm('確定要從非大庫房/總部增加庫存嗎？')) return;
                }
                const changeAmount = Math.abs(targetQty - currentQty);
                const typeLabel = targetQty > currentQty ? '鍵盤直改(增)' : '鍵盤直改(減)';
                database.ref('stocks/' + itemId + '/' + currentBranch).set(targetQty).then(() => {
                    const now = new Date();
                    writeLog(now.toISOString().split('T')[0], {
                        time: now.toTimeString().split(' ')[0].substring(0,5),
                        branch: currentBranch, item: itemName, type: typeLabel,
                        amount: changeAmount, result: targetQty
                    });
                    setLogMessage('【' + itemName + '】已重設為 ' + targetQty);
                    setTimeout(() => setLogMessage(''), 1200);
                    setInputValues(prev => ({ ...prev, [itemId]: '' }));
                });
            };

            const handleShipmentSubmit = (itemId, itemName) => {
                const inputValue = inputValues[itemId];
                if (!inputValue || parseInt(inputValue, 10) <= 0) { alert('請輸入大於 0 的出貨數量'); return; }
                const shipQty = parseInt(inputValue, 10);
                const availableTargets = branches.filter(b => b !== currentBranch);
                const targetStore = shipToBranches[itemId] || availableTargets[0];
                if (targetStore === currentBranch) { alert('出貨目的地不能與當前所在地相同！'); return; }
                const storeStock = stockData[itemId] || {};
                const currentSourceQty = storeStock[currentBranch] || 0;
                const currentTargetQty = storeStock[targetStore] || 0;
                if (currentSourceQty < shipQty) {
                    if (!window.confirm(currentBranch + '庫存不足（現有:' + currentSourceQty + '），確定強制出貨嗎？（本庫將歸零）')) return;
                }
                const newSourceQty = Math.max(0, currentSourceQty - shipQty);
                const newTargetQty = currentTargetQty + shipQty;
                const updates = {};
                updates['stocks/' + itemId + '/' + currentBranch] = newSourceQty;
                updates['stocks/' + itemId + '/' + targetStore] = newTargetQty;
                database.ref().update(updates).then(() => {
                    const now = new Date();
                    writeLog(now.toISOString().split('T')[0], {
                        time: now.toTimeString().split(' ')[0].substring(0,5),
                        branch: currentBranch, item: itemName, type: '🚚轉運至' + targetStore,
                        amount: shipQty, result: newSourceQty
                    });
                    setLogMessage('🚀 ' + currentBranch + '已配發 ' + shipQty + ' 至 ' + targetStore);
                    setTimeout(() => setLogMessage(''), 2000);
                    setInputValues(prev => ({ ...prev, [itemId]: '' }));
                }).catch(err => alert('出貨失敗：' + err.message));
            };

            // ========== CSV 上傳邏輯 ==========
            const handleCSVFile = (e) => {
                setCsvPreview(null); setCsvError(''); setDeductSummary(null); setDeductDone(false);
                const file = e.target.files[0];
                if (!file) return;
                setCsvFilename(file.name);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    const rows = parseCSV(text);
                    if (rows === null) {
                        setCsvError('❌ 無法識別 CSV 格式！支援：熊貓、Uber、POS（類別排行榜）、自訂格式（品項名稱,杯型,數量）');
                        return;
                    }
                    if (rows.length === 0) {
                        setCsvError('❌ CSV 解析成功但找不到有效的銷售資料（數量需大於0）');
                        return;
                    }
                    setCsvPreview(rows);
                    // 計算倒扣摘要
                    // rawPacks: { ingredientId: 總消耗包數 } (未換算前)
                    const rawPacks = {};
                    const unmatched = [];
                    rows.forEach(row => {
                        if (!row.product) { unmatched.push(row.rawName); return; }
                        const rule = DEDUCT_RULES[row.product];
                        if (!rule) { unmatched.push(row.rawName); return; }
                        const sizeRule = rule[row.size] || rule['L'];
                        Object.entries(sizeRule).forEach(([ingId, perCup]) => {
                            rawPacks[ingId] = (rawPacks[ingId] || 0) + perCup * row.qty;
                        });
                    });
                    // 正確換算邏輯：
                    // 目前庫存袋數 × 每袋包數 = 目前總包數
                    // 目前總包數 - 消耗包數 = 剩餘包數
                    // 剩餘包數 ÷ 每袋包數（取整） = 剩餘袋數
                    // 扣除袋數 = 目前袋數 - 剩餘袋數
                    const summary = {};
                    Object.entries(rawPacks).forEach(([ingId, consumedPacks]) => {
                        const packsPerBag = PACKS_PER_BAG[ingId] || 1;
                        const currentBags = (stockData[ingId] && stockData[ingId][currentBranch]) || 0;
                        const currentTotalPacks = currentBags * packsPerBag;
                        const remainPacks = Math.max(0, currentTotalPacks - consumedPacks);
                        const remainBags = Math.floor(remainPacks / packsPerBag);
                        const deductBags = currentBags - remainBags;
                        summary[ingId] = { bags: deductBags, consumedPacks, packsPerBag, currentBags, remainBags, remainPacks };
                    });
                    setDeductSummary({ summary, unmatched, rawPacks });
                };
                reader.readAsText(file, 'UTF-8');
            };

            const handleConfirmDeduct = () => {
                if (!deductSummary || !deductSummary.summary) return;
                if (!window.confirm('確認從【' + currentBranch + '】自動倒扣以下原物料庫存？')) return;
                const { summary } = deductSummary;
                const updates = {};
                const logEntries = [];
                Object.entries(summary).forEach(([ingId, info]) => {
                    const deductBags = info.bags;
                    if (deductBags <= 0) return;
                    const currentQty = (stockData[ingId] && stockData[ingId][currentBranch]) || 0;
                    const newQty = info.remainBags;
                    updates['stocks/' + ingId + '/' + currentBranch] = newQty;
                    logEntries.push({ ingId, deductQty: deductBags, newQty, name: INGREDIENT_NAMES[ingId] || ingId });
                });
                database.ref().update(updates).then(() => {
                    const now = new Date();
                    const dateStr = now.toISOString().split('T')[0];
                    logEntries.forEach(entry => {
                        writeLog(dateStr, {
                            time: now.toTimeString().split(' ')[0].substring(0,5),
                            branch: currentBranch,
                            item: entry.name,
                            type: '📊CSV銷售倒扣',
                            amount: entry.deductQty,
                            result: entry.newQty
                        });
                    });
                    setDeductDone(true);
                    setLogMessage('✅ ' + currentBranch + ' 銷售倒扣完成！共扣除 ' + Object.keys(summary).length + ' 種原料');
                    setTimeout(() => setLogMessage(''), 3000);
                }).catch(err => alert('倒扣失敗：' + err.message));
            };

            const resetCSV = () => {
                setCsvPreview(null); setCsvError(''); setCsvFilename('');
                setDeductSummary(null); setDeductDone(false);
            };

            // ========== 登入畫面 ==========
            if (!isLoggedIn) {
                return (
                    <div class="flex items-center justify-center min-h-screen bg-gray-950 px-4">
                        <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-xl max-w-sm w-full">
                            <div class="text-center mb-6">
                                <div class="w-16 h-16 bg-teal-950/50 border border-teal-800 text-teal-400 rounded-2xl flex items-center justify-center mx-auto text-2xl font-bold mb-2">🔒</div>
                                <h1 class="text-xl font-bold text-gray-100">水之茶 實名系統</h1>
                                <p class="text-xs text-gray-500 mt-1">請輸入專屬三碼員工編號登入</p>
                            </div>
                            <form onSubmit={handleLoginSubmit} class="space-y-4">
                                <div>
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">員工帳號 (三碼)</label>
                                    <input type="text" pattern="[0-9]*" inputmode="numeric" placeholder="例如: 001"
                                        value={username} onChange={(e) => setUsername(e.target.value)}
                                        class="w-full px-3 py-2.5 bg-gray-950 border border-gray-800 rounded-xl text-sm focus:outline-none focus:border-teal-500 text-gray-200 font-mono tracking-widest text-center text-lg" required />
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">驗證密碼</label>
                                    <input type="password" pattern="[0-9]*" inputmode="numeric" placeholder="例如: 001"
                                        value={password} onChange={(e) => setPassword(e.target.value)}
                                        class="w-full px-3 py-2.5 bg-gray-950 border border-gray-800 rounded-xl text-sm focus:outline-none focus:border-teal-500 text-gray-200 font-mono tracking-widest text-center text-lg" required />
                                </div>
                                {loginError && <p class="text-xs font-semibold text-red-400 text-center">{loginError}</p>}
                                <button type="submit" class="w-full py-2.5 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-xl text-sm shadow-md cursor-pointer transition-all text-center text-base">
                                    驗證身分並解鎖
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (loading) {
                return (
                    <div class="flex items-center justify-center min-h-screen bg-gray-950">
                        <p class="text-xl font-semibold text-teal-400 animate-pulse">📡 正在同步雲端數據中...</p>
                    </div>
                );
            }

            const dayLogs = historyData[filterDate] ? Object.values(historyData[filterDate]) : [];

            const renderItemCard = (item) => {
                const qty = (stockData[item.id] && stockData[item.id][currentBranch]) || 0;
                const isLow = qty <= LOW_STOCK_ALERT;
                const currentInputValue = inputValues[item.id] || '';
                const availableTargets = branches.filter(b => b !== currentBranch);
                const selectedTargetStore = shipToBranches[item.id] || availableTargets[0];
                return (
                    <div key={item.id} class="bg-gray-900 p-4 rounded-xl shadow-md border border-gray-800 flex flex-col space-y-3">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="font-bold text-gray-100 text-lg">{item.name}</h3>
                                <p class="text-sm text-gray-400 mt-0.5">
                                    目前庫存：
                                    <span class={"font-bold text-2xl ml-1 " + (isLow ? "text-red-400 animate-pulse" : "text-emerald-400")}>{qty}</span>
                                    {isLow && <span class="text-[10px] text-red-400 font-bold ml-2 bg-red-950/50 px-1.5 py-0.5 rounded border border-red-900">補貨</span>}
                                </p>
                            </div>
                            <div class="flex items-center space-x-1">
                                <button onClick={function() { handleButtonClick(item.id, item.name, -1); }} class="w-9 h-9 bg-gray-800 active:bg-gray-700 text-gray-300 font-bold rounded-lg text-sm flex items-center justify-center shadow-sm">-1</button>
                                <button onClick={function() { handleButtonClick(item.id, item.name, 1); }} class="w-9 h-9 bg-gray-800 active:bg-gray-700 text-emerald-400 font-bold rounded-lg text-sm flex items-center justify-center shadow-sm">+1</button>
                            </div>
                        </div>
                        {logisticsBranches.includes(currentBranch) ? (
                            <div class="pt-2.5 border-t border-dashed border-gray-800 flex flex-col space-y-2">
                                <div class="flex items-center space-x-1.5">
                                    <input type="number" pattern="[0-9]*" inputmode="numeric" placeholder="數量" value={currentInputValue}
                                        onChange={function(e) { setInputValues(prev => ({ ...prev, [item.id]: e.target.value })); }}
                                        class="w-1/2 px-2.5 py-1.5 border border-gray-700 rounded-lg text-sm bg-gray-950 text-gray-100 focus:outline-none focus:border-teal-500 font-medium placeholder-gray-600" />
                                    <select value={selectedTargetStore}
                                        onChange={function(e) { setShipToBranches(prev => ({ ...prev, [item.id]: e.target.value })); }}
                                        class="w-1/2 px-2 py-1.5 border border-gray-700 rounded-lg text-sm bg-gray-950 focus:outline-none text-gray-300 font-semibold">
                                        {availableTargets.map(st => <option key={st} value={st}>🚚 移至 {st}</option>)}
                                    </select>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onClick={function() { handleCustomInputSubmit(item.id, item.name); }}
                                        class="py-1.5 bg-gray-800 active:bg-gray-700 text-gray-400 font-bold rounded-lg text-xs text-center">僅改本庫存</button>
                                    <button onClick={function() { handleShipmentSubmit(item.id, item.name); }}
                                        class="py-1.5 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-lg text-xs text-center shadow-sm">確認出貨轉運</button>
                                </div>
                            </div>
                        ) : (
                            <div class="flex items-center space-x-2 pt-2 border-t border-dashed border-gray-800">
                                <input type="number" pattern="[0-9]*" inputmode="numeric" placeholder="輸入新庫存數量" value={currentInputValue}
                                    onChange={function(e) { setInputValues(prev => ({ ...prev, [item.id]: e.target.value })); }}
                                    class="flex-1 px-3 py-1.5 border border-gray-700 rounded-lg text-sm bg-gray-950 text-gray-100 focus:outline-none focus:border-teal-500 font-medium placeholder-gray-600" />
                                <button onClick={function() { handleCustomInputSubmit(item.id, item.name); }}
                                    class="px-3 py-1.5 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-lg text-xs shadow-sm">確認修改</button>
                            </div>
                        )}
                    </div>
                );
            };

            // ========== 銷售倒扣頁面 ==========
            const renderSalesTab = () => {
                const isSalesBranch = salesBranches.includes(currentBranch);
                if (!isSalesBranch) {
                    return (
                        <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 text-center">
                            <p class="text-4xl mb-3">🏭</p>
                            <p class="text-gray-400 font-semibold">銷售倒扣功能僅限</p>
                            <p class="text-teal-400 font-bold mt-1">自強店 ／ 玉山店 ／ 水上店</p>
                            <p class="text-gray-500 text-sm mt-2">請先切換到門市據點</p>
                        </div>
                    );
                }
                return (
                    <div class="space-y-4">
                        {/* 說明卡 */}
                        <div class="bg-blue-950/40 border border-blue-800/50 rounded-xl p-4">
                            <h3 class="text-sm font-bold text-blue-300 mb-2">📋 支援格式說明</h3>
                            <p class="text-xs text-gray-400 leading-relaxed mb-2">上傳當日銷售報表，系統自動識別格式並倒扣<span class="text-teal-300 font-bold">【{currentBranch}】</span>庫存。</p>
                            <div class="space-y-1.5">
                                <div class="flex items-start gap-2 text-xs">
                                    <span class="bg-orange-900/50 text-orange-300 px-1.5 py-0.5 rounded font-bold text-[10px] shrink-0 mt-0.5">熊貓</span>
                                    <span class="text-gray-500">直接匯出即可，品名格式如「西瓜汁 (大杯)」「甘蔗青 (特大杯)」</span>
                                </div>
                                <div class="flex items-start gap-2 text-xs">
                                    <span class="bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded font-bold text-[10px] shrink-0 mt-0.5">Uber</span>
                                    <span class="text-gray-500">直接匯出即可，自動抓「商品名稱」與「最終數量」欄</span>
                                </div>
                                <div class="flex items-start gap-2 text-xs">
                                    <span class="bg-teal-900/50 text-teal-300 px-1.5 py-0.5 rounded font-bold text-[10px] shrink-0 mt-0.5">POS</span>
                                    <span class="text-gray-500">類別商品銷售排行榜，品名帶 [XL][L] 標籤</span>
                                </div>
                            </div>
                        </div>

                        {/* 上傳區 */}
                        {!csvPreview && !csvError && (
                            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-700 rounded-xl cursor-pointer bg-gray-900 hover:border-teal-600 transition-colors">
                                <span class="text-3xl mb-2">📂</span>
                                <span class="text-sm font-semibold text-gray-400">點擊上傳 CSV 銷售報表</span>
                                <span class="text-xs text-gray-600 mt-1">支援 .csv 格式</span>
                                <input type="file" accept=".csv" class="hidden" onChange={handleCSVFile} />
                            </label>
                        )}

                        {csvError && (
                            <div class="bg-red-950/50 border border-red-800 rounded-xl p-4 text-center">
                                <p class="text-red-400 font-semibold text-sm">{csvError}</p>
                                <button onClick={resetCSV} class="mt-3 px-4 py-1.5 bg-gray-800 text-gray-300 text-xs font-bold rounded-lg">重新上傳</button>
                            </div>
                        )}

                        {csvPreview && deductSummary && !deductDone && (
                            <div class="space-y-3">
                                {/* 解析結果 */}
                                <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
                                    <div class="flex items-center justify-between mb-3">
                                        <h3 class="text-sm font-bold text-gray-300">📄 解析結果：{csvFilename}</h3>
                                        <button onClick={resetCSV} class="text-[10px] text-gray-500 bg-gray-800 px-2 py-1 rounded-lg">重新上傳</button>
                                    </div>
                                    <div class="space-y-1 max-h-40 overflow-y-auto">
                                        {csvPreview.map((row, i) => (
                                            <div key={i} class={"flex items-center justify-between text-xs px-2 py-1.5 rounded-lg " + (row.product ? "bg-gray-950" : "bg-red-950/30 border border-red-900/50")}>
                                                <span class={"font-medium " + (row.product ? "text-gray-300" : "text-red-400")}>{row.rawName}</span>
                                                <div class="flex items-center gap-1.5">
                                                    {row.source && <span class="text-[9px] px-1 py-0.5 rounded bg-gray-800 text-gray-500">{row.source}</span>}
                                                    <span class={"text-[10px] px-1.5 py-0.5 rounded font-bold " + (row.size === 'XL' ? "bg-purple-900/50 text-purple-300" : "bg-blue-900/50 text-blue-300")}>{row.size}</span>
                                                    <span class="text-emerald-400 font-bold">×{row.qty}</span>
                                                    {!row.product && <span class="text-red-400 text-[10px]">未識別</span>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {deductSummary.unmatched.length > 0 && (
                                        <p class="text-xs text-amber-400 mt-2 bg-amber-950/30 px-2 py-1.5 rounded-lg border border-amber-900/50">
                                            ⚠️ {deductSummary.unmatched.length} 筆品項未能識別（不會被倒扣）：{deductSummary.unmatched.slice(0,3).join('、')}{deductSummary.unmatched.length > 3 ? '...' : ''}
                                        </p>
                                    )}
                                </div>

                                {/* 倒扣預覽 */}
                                <div class="bg-gray-900 border border-teal-800/50 rounded-xl p-4">
                                    <h3 class="text-sm font-bold text-teal-300 mb-1">🧮 預計倒扣原料（{currentBranch}）</h3>
                                    <p class="text-[10px] text-gray-500 mb-3">庫存袋×包數 − 消耗包數 = 剩餘包數 ÷ 每袋包數（取整）= 剩餘袋數</p>
                                    <div class="space-y-2">
                                        {Object.entries(deductSummary.summary).map(([ingId, info]) => {
                                            const { bags, consumedPacks, packsPerBag, currentBags, remainBags, remainPacks } = info;
                                            const currentTotalPacks = currentBags * packsPerBag;
                                            const notEnough = bags === 0;
                                            const willBeNeg = remainPacks < 0;
                                            return (
                                                <div key={ingId} class={"px-3 py-2 rounded-lg " + (notEnough ? "bg-gray-900 border border-gray-800 opacity-50" : willBeNeg ? "bg-red-950/30 border border-red-900/50" : "bg-gray-950")}>
                                                    <div class="flex items-center justify-between">
                                                        <span class={"text-sm font-semibold " + (notEnough ? "text-gray-500" : "text-gray-200")}>{INGREDIENT_NAMES[ingId] || ingId}</span>
                                                        <div class="flex items-center gap-2 text-xs">
                                                            <span class="text-gray-400 font-bold">{currentBags}袋</span>
                                                            <span class="text-gray-500">→</span>
                                                            <span class={"font-bold text-base " + (notEnough ? "text-gray-500" : "text-emerald-400")}>{remainBags}袋</span>
                                                            {notEnough && <span class="text-gray-600 text-[10px]">（不變）</span>}
                                                        </div>
                                                    </div>
                                                    <div class="text-[10px] text-gray-600 mt-1 leading-relaxed">
                                                        {currentBags}袋×{packsPerBag} = {currentTotalPacks}包
                                                        <span class="text-red-500 mx-1">− {consumedPacks}包</span>
                                                        = {Math.max(0, currentTotalPacks - consumedPacks)}包
                                                        <span class="text-gray-500 mx-1">÷ {packsPerBag}</span>
                                                        = <span class="text-emerald-600 font-bold">{remainBags}袋</span>
                                                        {notEnough && <span class="text-amber-700 ml-1">（消耗不足整袋）</span>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* 確認按鈕 */}
                                <button onClick={handleConfirmDeduct}
                                    class="w-full py-3 bg-teal-600 active:bg-teal-500 text-white font-bold rounded-xl text-base shadow-lg">
                                    ✅ 確認倒扣【{currentBranch}】庫存
                                </button>
                                <button onClick={resetCSV} class="w-full py-2 bg-gray-800 text-gray-400 font-bold rounded-xl text-sm">取消</button>
                            </div>
                        )}

                        {deductDone && (
                            <div class="bg-teal-950/50 border border-teal-700 rounded-xl p-6 text-center">
                                <p class="text-4xl mb-2">✅</p>
                                <p class="text-teal-300 font-bold text-lg">倒扣完成！</p>
                                <p class="text-gray-400 text-sm mt-1">【{currentBranch}】庫存已依銷售自動更新</p>
                                <button onClick={resetCSV} class="mt-4 px-6 py-2 bg-teal-700 active:bg-teal-600 text-white font-bold rounded-xl text-sm">再上傳一份</button>
                            </div>
                        )}
                    </div>
                );
            };

            // ========== 主畫面 ==========
            return (
                <div class="max-w-md mx-auto p-4 sm:p-6 pb-12">
                    {/* 頂部 */}
                    <div class="bg-gradient-to-r from-teal-700 to-emerald-700 text-white p-6 rounded-2xl shadow-lg mb-6 text-center border border-teal-600/30 relative">
                        <h1 class="text-2xl font-bold tracking-wider">水之茶 庫存app</h1>
                        <p class="text-xs opacity-95 mt-1 bg-black/20 inline-block px-3 py-1 rounded-full border border-white/10">
                            👤 當前操作者：<span class="font-mono font-bold text-yellow-300 text-sm">{activeUser}</span>
                        </p>
                        <button onClick={handleLogout} class="absolute top-3 right-3 text-[10px] bg-black/40 hover:bg-black/60 border border-white/15 px-2 py-1 rounded-md text-gray-200 font-semibold active:scale-95 transition-all">
                            更換帳號 🔓
                        </button>
                    </div>

                    {/* 切換據點 */}
                    <div class="mb-5">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">請選擇目前查看據點：</label>
                        <div class="grid grid-cols-2 gap-2">
                            {branches.map(function(b) {
                                const isLogistics = logisticsBranches.includes(b);
                                return (
                                    <button key={b} onClick={function() { setCurrentBranch(b); setActiveTab('stock'); resetCSV(); }}
                                        class={"p-3 rounded-xl font-bold text-sm shadow-sm transition-all border " + (currentBranch === b ? "bg-teal-600 text-white border-teal-500 shadow-teal-900/50" : "bg-gray-900 text-gray-400 border-gray-800")}>
                                        {isLogistics ? '📦 ' : '🏪 '}{b}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* 頁籤（只在門市顯示） */}
                    {salesBranches.includes(currentBranch) && (
                        <div class="flex gap-2 mb-5">
                            <button onClick={() => setActiveTab('stock')}
                                class={"flex-1 py-2.5 rounded-xl font-bold text-sm transition-all border " + (activeTab === 'stock' ? "bg-gray-700 text-white border-gray-600" : "bg-gray-900 text-gray-500 border-gray-800")}>
                                📦 庫存管理
                            </button>
                            <button onClick={() => setActiveTab('sales')}
                                class={"flex-1 py-2.5 rounded-xl font-bold text-sm transition-all border " + (activeTab === 'sales' ? "bg-teal-600 text-white border-teal-500" : "bg-gray-900 text-gray-500 border-gray-800")}>
                                📊 銷售倒扣
                            </button>
                        </div>
                    )}

                    {/* 快顯 */}
                    {logMessage && (
                        <div class="sticky top-4 z-50 mb-4 p-2.5 bg-teal-950/80 text-teal-300 text-sm font-semibold rounded-xl text-center shadow-lg border border-teal-800 backdrop-blur-md">
                            {logMessage}
                        </div>
                    )}

                    {/* 內容區 */}
                    {activeTab === 'sales' ? renderSalesTab() : (
                        <>
                            <div class="mb-8">
                                <div class="flex items-center justify-between mb-3 pl-1">
                                    <h2 class="text-lg font-bold text-gray-300 flex items-center gap-1.5">
                                        <span class="w-1.5 h-5 bg-teal-500 rounded-full"></span>
                                        🧊 冷凍瓶支
                                    </h2>
                                </div>
                                <div class="space-y-3">{bottleItems.map(renderItemCard)}</div>
                            </div>
                            <div class="mb-8">
                                <div class="flex items-center justify-between mb-3 pl-1">
                                    <h2 class="text-lg font-bold text-gray-300 flex items-center gap-1.5">
                                        <span class="w-1.5 h-5 bg-teal-500 rounded-full"></span>
                                        🛍️ 冷凍袋數
                                    </h2>
                                </div>
                                <div class="space-y-3">{bagItems.map(renderItemCard)}</div>
                            </div>
                            <div class="bg-gray-900 p-4 rounded-xl shadow-md border border-gray-800">
                                <h2 class="text-base font-bold text-gray-300 mb-3 flex items-center gap-1.5">📜 異動與叫貨歷史追溯</h2>
                                <div class="mb-4">
                                    <label class="block text-xs font-bold text-gray-500 mb-1">選擇查詢日期：</label>
                                    <input type="date" value={filterDate} onChange={function(e) { setFilterDate(e.target.value); }}
                                        class="w-full p-2 border border-gray-700 rounded-lg text-sm bg-gray-950 text-gray-200 font-medium focus:outline-none focus:border-teal-500" />
                                </div>
                                <div class="space-y-2 max-h-60 overflow-y-auto pr-1">
                                    {dayLogs.length === 0 ? (
                                        <p class="text-center text-xs text-gray-500 py-4">📅 該日期沒有任何庫存叫貨紀錄</p>
                                    ) : (
                                        dayLogs.slice().reverse().map(function(log, index) {
                                            return (
                                                <div key={index} class="text-xs p-2 bg-gray-950 rounded-lg border border-gray-800 flex justify-between items-center">
                                                    <div>
                                                        <span class="text-gray-500">[{log.time}]</span>{' '}
                                                        <span class="font-bold text-teal-400">{log.branch}</span>{' '}
                                                        <span class="bg-gray-800 text-yellow-400 px-1 py-0.5 rounded text-[10px] font-mono font-bold mr-1">👤{log.operator || '---'}</span>{' '}
                                                        <span class="text-gray-300">{log.item}</span>
                                                    </div>
                                                    <div class="text-right">
                                                        <span class="text-gray-500 mr-2">({log.type})</span>
                                                        <span class={"font-bold " + (log.type.includes('增') || log.type.includes('轉運') || log.type === '入庫/出貨' ? "text-blue-400" : "text-amber-500")}>
                                                            {log.type.includes('增') || log.type.includes('轉運') || log.type === '入庫/出貨' ? '+' : '-'}{log.amount}
                                                        </span>
                                                        <span class="text-gray-500 ml-1">(餘:{log.result})</span>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
